<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KP v-PRO | WORLD CLASS</title>
    <style>
        :root { --p: #6366f1; --bg: #f8fafc; --txt: #0f172a; --card: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--txt); height: 100dvh; display: flex; justify-content: center; overflow: hidden; }
        .container { width: 100%; max-width: 480px; display: flex; flex-direction: column; padding: 12px; gap: 10px; }
        
        /* Header & Heatmap */
        header { background: var(--card); padding: 14px 20px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .streak-fire { font-weight: 900; color: #f97316; font-size: 1.3rem; display: flex; align-items: center; gap: 4px; }
        .heat-map { display: grid; grid-template-columns: repeat(14, 1fr); gap: 3px; }
        .heat-cell { width: 7px; height: 7px; border-radius: 2px; background: #e2e8f0; }

        /* Main View */
        #view { flex-grow: 1; overflow-y: auto; scrollbar-width: none; position: relative; }
        #view::-webkit-scrollbar { display: none; }

        /* Card System */
        .card { background: var(--card); border-radius: 30px; padding: 30px; min-height: 360px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border: 1.5px solid #e2e8f0; transition: 0.2s cubic-bezier(0.2, 0, 0, 1); cursor: pointer; }
        .card:active { transform: scale(0.98); border-color: var(--p); }
        
        /* Buttons */
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        button { border: none; border-radius: 16px; padding: 14px 5px; font-weight: 800; font-size: 10px; text-transform: uppercase; cursor: pointer; transition: 0.1s; background: var(--card); border: 1px solid #e2e8f0; color: #64748b; }
        button.active { background: #1e293b; color: #fff; transform: translateY(-1px); }
        .btn-prime { background: var(--p); color: #fff; border: none; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        input { width: 100%; padding: 15px; border-radius: 18px; border: 2px solid #e2e8f0; outline: none; font-size: 1rem; transition: 0.2s; background: #fff; }
        input:focus { border-color: var(--p); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .item-row { background: #fff; padding: 12px 18px; border-radius: 20px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f1f5f9; animation: sUp 0.2s ease-out; }
        @keyframes sUp { from { opacity: 0; transform: translateY(8px); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="streak-fire">🔥 <span id="streak">0</span></div>
            <div id="heatmap" class="heat-map"></div>
        </header>

        <main id="view"></main>

        <nav class="btn-grid">
            <button onclick="Core.route('study')" id="n-study">Study</button>
            <button onclick="Core.route('nexus')" id="n-nexus">Nexus</button>
            <button onclick="Core.route('vault')" id="n-vault">Vault</button>
            <button onclick="Core.route('data')" id="n-data">Data</button>
        </nav>
    </div>

    <script>
        const $ = (id) => document.getElementById(id);
        
        const DB = {
            vocab: new Map(),
            meta: { streak: 0, lastDate: null, history: {}, speechRate: 0.9 },
            trie: {},
            apiCache: new Map(),

            async init() {
                return new Promise(r => {
                    const req = indexedDB.open("KP_VPRO_WORLD", 1);
                    req.onupgradeneeded = e => {
                        const db = e.target.result;
                        db.createObjectStore("vocab", { keyPath: "id" });
                        db.createObjectStore("meta");
                    };
                    req.onsuccess = async e => {
                        this.idb = e.target.result;
                        await this.loadAll();
                        r();
                    };
                });
            },

            addToTrie(item) {
                let n = this.trie;
                for (let c of item.en.toLowerCase()) {
                    if (!n[c]) n[c] = {};
                    n = n[c];
                }
                if (!n._i) n._i = new Set();
                n._i.add(item.id);
            },

            removeFromTrie(item) {
                const backtrack = (node, chars, index) => {
                    if (index === chars.length) {
                        if (node._i) node._i.delete(item.id);
                        return Object.keys(node).length === (node._i?.size === 0 ? 0 : 1); 
                    }
                    const char = chars[index];
                    if (node[char] && backtrack(node[char], chars, index + 1)) {
                        delete node[char];
                        return Object.keys(node).length === (node._i ? 1 : 0);
                    }
                    return false;
                };
                backtrack(this.trie, item.en.toLowerCase(), 0);
            },

            searchTrie(q, limit = 20) {
                let n = this.trie;
                for (let c of q.toLowerCase()) {
                    if (!n[c]) return [];
                    n = n[c];
                }
                const res = [];
                const collect = (node) => {
                    if (res.length >= limit) return;
                    if (node._i) res.push(...node._i);
                    for (let k in node) if (k !== '_i') collect(node[k]);
                };
                collect(n);
                return res.slice(0, limit);
            },

            async loadAll() {
                const tx = this.idb.transaction(["vocab", "meta"], "readonly");
                const [v, m] = await Promise.all([
                    new Promise(r => tx.objectStore("vocab").getAll().onsuccess = e => r(e.target.result)),
                    new Promise(r => tx.objectStore("meta").get("g").onsuccess = e => r(e.target.result))
                ]);
                v.forEach(item => { this.vocab.set(item.id, item); this.addToTrie(item); });
                if (m) this.meta = m;
                this.syncUI();
            },

            syncUI() {
                $('streak').innerText = this.meta.streak;
                const h = $('heatmap'); h.innerHTML = '';
                for(let i=13; i>=0; i--) {
                    const d = new Date(); d.setDate(d.getDate() - i);
                    const count = this.meta.history[d.toDateString()] || 0;
                    const c = document.createElement('div');
                    c.className = 'heat-cell';
                    c.style.background = count > 0 ? `rgba(99, 102, 241, ${Math.min(0.2 + count * 0.25, 1)})` : '#e2e8f0';
                    h.appendChild(c);
                }
            }
        };

        const Core = {
            state: { view: '', queue: [], debouncer: null },

            route(v) {
                this.state.view = v;
                document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.id === `n-${v}`));
                this['render' + v.charAt(0).toUpperCase() + v.slice(1)]();
            },

            speak(t) {
                window.speechSynthesis.cancel();
                const m = new SpeechSynthesisUtterance(t);
                m.rate = DB.meta.speechRate;
                window.speechSynthesis.speak(m);
            },

            renderStudy() {
                const now = Date.now();
                this.state.queue = Array.from(DB.vocab.values()).filter(i => i.next <= now).sort((a,b) => a.next - b.next);
                const v = $('view');
                if (!this.state.queue.length) {
                    v.innerHTML = `<div class="card" style="border-style:dashed; color:#94a3b8">🏆 HOÀN THÀNH!<br><small>Hẹn gặp lại bạn ngày mai</small></div>`;
                    return;
                }
                const item = this.state.queue[0];
                v.innerHTML = `
                    <div class="card" onclick="Core.flip()">
                        <div id="q-side">
                            <h1 style="font-size:3.2rem; margin:0; letter-spacing:-2px; text-transform:uppercase">${item.en}</h1>
                        </div>
                        <div id="a-side" style="display:none">
                            <h2 style="color:var(--p); font-size:2.2rem; text-transform:uppercase; margin:0">${item.vi}</h2>
                            <p style="color:#94a3b8; font-family:monospace">${item.ipa || ''}</p>
                        </div>
                    </div>
                    <div id="ctrl" class="btn-grid" style="margin-top:12px; visibility:hidden">
                        <button onclick="Core.ans(1)" style="color:#ef4444">Again</button>
                        <button onclick="Core.ans(3)">Hard</button>
                        <button onclick="Core.ans(4)">Good</button>
                        <button onclick="Core.ans(5)" class="btn-prime">Easy</button>
                    </div>`;
            },

            flip() {
                $('q-side').style.display = 'none';
                $('a-side').style.display = 'block';
                $('ctrl').style.visibility = 'visible';
                this.speak(this.state.queue[0].en);
            },

            async ans(q) {
                const item = this.state.queue[0];
                let { reps: r, ef, interval: i } = item;
                if (q >= 3) {
                    i = (r === 0) ? 1 : (r === 1 ? 4 : Math.round(i * ef));
                    r++;
                } else { r = 0; i = 1; }
                ef = Math.max(1.3, ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
                Object.assign(item, { reps: r, ef, interval: i, next: Date.now() + (i * 86400000) });
                
                const d = new Date().toDateString();
                DB.meta.history[d] = (DB.meta.history[d] || 0) + 1;
                this.updateStreak();

                const tx = DB.idb.transaction(["vocab", "meta"], "readwrite");
                tx.objectStore("vocab").put(item);
                tx.objectStore("meta").put(DB.meta, "g");
                await new Promise(r => tx.oncomplete = r);
                this.route('study');
            },

            updateStreak() {
                const today = new Date().toDateString();
                if (DB.meta.lastDate !== today) {
                    const last = new Date(DB.meta.lastDate);
                    DB.meta.streak = (DB.meta.lastDate && (new Date() - last) < 172800000) ? DB.meta.streak + 1 : 1;
                    DB.meta.lastDate = today;
                }
            },

            renderNexus() {
                $('view').innerHTML = `
                    <div class="card" style="min-height:auto; gap:16px; padding:25px">
                        <input id="in-en" placeholder="English Word..." oninput="Core.nexusDebounce()">
                        <input id="in-vi" placeholder="Meaning...">
                        <button onclick="Core.add()" class="btn-prime" style="width:100%">SAVE TO VAULT</button>
                    </div>`;
                $('in-en').focus();
            },

            nexusDebounce() {
                clearTimeout(this.state.debouncer);
                this.state.debouncer = setTimeout(async () => {
                    const val = $('in-en').value.trim();
                    if (val.length < 2) return;
                    if (DB.apiCache.has(val)) {
                        const cached = DB.apiCache.get(val);
                        $('in-vi').value = cached.vi;
                        this.state.lastIpa = cached.ipa;
                        return;
                    }
                    try {
                        const [t, i] = await Promise.all([
                            fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${val}`).then(r => r.json()),
                            fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${val}`).then(r => r.json()).catch(() => null)
                        ]);
                        const vi = t?.[0]?.[0]?.[0] || '';
                        const ipa = i?.[0]?.phonetic || '';
                        $('in-vi').value = vi;
                        this.state.lastIpa = ipa;
                        DB.apiCache.set(val, { vi, ipa });
                    } catch(e) {}
                }, 400);
            },

            add() {
                const en = $('in-en').value.trim(), vi = $('in-vi').value.trim();
                if (!en || !vi) return;
                const item = { id: Date.now(), en, vi, ipa: this.state.lastIpa || '', reps: 0, ef: 2.5, interval: 0, next: Date.now() };
                DB.vocab.set(item.id, item);
                DB.addToTrie(item);
                const tx = DB.idb.transaction("vocab", "readwrite");
                tx.objectStore("vocab").put(item);
                this.speak(en);
                this.route('nexus');
            },

            renderVault() {
                $('view').innerHTML = `<input id="v-search" placeholder="Search Vault..." oninput="Core.vaultSearch(this.value)"><div id="v-list" style="margin-top:10px"></div>`;
                this.vaultSearch('');
            },

            vaultSearch(q) {
                const ids = q ? DB.searchTrie(q) : Array.from(DB.vocab.keys()).slice(-30);
                const html = ids.reverse().map(id => {
                    const it = DB.vocab.get(id);
                    return `<div class="item-row"><div><b>${it.en}</b><br><small style="color:var(--p)">${it.vi}</small></div><button onclick="Core.del(${id})" style="border:none; color:#fb7185; font-size:9px">DEL</button></div>`;
                }).join('');
                $('v-list').innerHTML = html;
            },

            del(id) {
                const item = DB.vocab.get(id);
                if (item) {
                    DB.removeFromTrie(item);
                    DB.vocab.delete(id);
                    DB.idb.transaction("vocab", "readwrite").objectStore("vocab").delete(id);
                    this.renderVault();
                    DB.syncUI();
                }
            },

            renderData() {
                $('view').innerHTML = `
                    <div class="card" style="min-height:auto; gap:12px; padding:25px">
                        <label style="font-size:10px; font-weight:900; color:#94a3b8">SPEECH RATE: ${DB.meta.speechRate}x</label>
                        <input type="range" min="0.5" max="1.2" step="0.1" value="${DB.meta.speechRate}" oninput="DB.meta.speechRate=parseFloat(this.value); Core.saveMeta()">
                        <button onclick="Core.export()" style="width:100%">EXPORT BACKUP</button>
                        <button onclick="if(confirm('Wipe All?')){indexedDB.deleteDatabase('KP_VPRO_WORLD'); location.reload()}" style="width:100%; color:#ef4444; border:none">FACTORY RESET</button>
                    </div>`;
            },

            saveMeta() {
                const tx = DB.idb.transaction("meta", "readwrite");
                tx.objectStore("meta").put(DB.meta, "g");
            },

            export() {
                const data = JSON.stringify(Array.from(DB.vocab.values()));
                const blob = new Blob([data], {type: 'application/json'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'vpro_backup.json'; a.click();
            }
        };

        DB.init().then(() => Core.route('study'));
    </script>
</body>
</html>
