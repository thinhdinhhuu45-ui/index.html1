<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHAI PHÓNG v22 - THE SOPHISTICATION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #f0f2f5; color: #1a1a1a; }
        .tab-active { background: #4f46e5 !important; color: white !important; transform: scale(1.05); }
        .card { perspective: 1200px; height: 380px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 32px; border: 1px solid rgba(0,0,0,0.05); font-size: 2.8rem; font-weight: 700; background: white; padding: 30px; shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .face-back { transform: rotateY(180deg); background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        input, textarea { transition: all 0.2s; border: 1px solid #e2e8f0 !important; }
        input:focus, textarea:focus { border-color: #4f46e5 !important; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1) !important; }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <div class="w-full max-w-md flex flex-col h-[95dvh]">
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="flex flex-col">
                <h1 class="text-2xl font-black italic text-indigo-600 leading-none">KP v22</h1>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 italic">Sophisticated Edition</span>
            </div>
            <p id="count" class="text-xs font-black bg-white px-3 py-1 rounded-full shadow-sm text-slate-500 border border-slate-100"></p>
        </div>

        <main id="app" class="flex-grow overflow-hidden relative bg-white rounded-[40px] shadow-2xl shadow-indigo-100 border border-white p-6"></main>

        <nav class="mt-6 flex gap-2 bg-white/50 backdrop-blur-md p-2 rounded-[28px] shadow-lg border border-white">
            <button onclick="router('study')" id="m-study" class="flex-1 py-3 rounded-2xl font-bold transition-all duration-300 hover:bg-indigo-50 text-slate-600">HỌC</button>
            <button onclick="router('add')" id="m-add" class="flex-1 py-3 rounded-2xl font-bold transition-all duration-300 hover:bg-indigo-50 text-slate-600 text-sm">THÊM TỪ</button>
            <button onclick="router('list')" id="m-list" class="flex-1 py-3 rounded-2xl font-bold transition-all duration-300 hover:bg-indigo-50 text-slate-600">KHO</button>
        </nav>
    </div>

    <script>
        const db = {
            data: JSON.parse(localStorage.getItem('KP_V22_DATA')) || [],
            save() {
                localStorage.setItem('KP_V22_DATA', JSON.stringify(this.data));
                document.getElementById('count').innerText = this.data.length + " UNITS";
            }
        };

        let state = { view: '', idx: 0, flipped: false, queue: [] };

        // HÀM DỊCH TINH TẾ (Fix lỗi "hạ tay xuống" và "gãy chân")
        async function translate(word) {
            if(!word) return "";
            try {
                // Thêm context học thuật ngầm để Google hiểu đây là thành ngữ/cụm từ
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&dt=at&q=meaning of ${encodeURIComponent(word)}`;
                const res = await fetch(url);
                const data = await res.json();
                
                let result = data[0][0][0].toLowerCase();
                
                // Loại bỏ phần context rác nếu có
                result = result.replace(/nghĩa là /g, "").replace(/ý nghĩa của /g, "").replace(/của /g, "");

                const dictionary = {
                    "break a leg": "chúc may mắn",
                    "hand down": "truyền lại / tuyên án",
                    "hands down": "dễ dàng / chắc chắn",
                    "piece of cake": "dễ như ăn bánh",
                    "call it a day": "nghỉ tay thôi",
                    "hang in there": "cố gắng lên"
                };

                return dictionary[word.toLowerCase().trim()] || result;
            } catch { return ""; }
        }

        function router(view) {
            state.view = view;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            const activeBtn = document.getElementById('m-' + view);
            if(activeBtn) activeBtn.classList.add('tab-active');
            
            const container = document.getElementById('app');
            container.innerHTML = '';

            if (view === 'add') renderAdd(container);
            if (view === 'list') renderList(container);
            if (view === 'study') renderStudy(container);
            db.save();
        }

        function renderAdd(v) {
            v.innerHTML = `
                <div class="h-full flex flex-col space-y-5 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="bg-indigo-50/50 p-5 rounded-[30px] border border-indigo-100/50">
                        <p class="text-[9px] font-black text-indigo-400 mb-3 uppercase tracking-[0.2em]">Tra cứu nhanh</p>
                        <input id="in-en" placeholder="Gõ tiếng Anh..." class="w-full p-4 rounded-2xl bg-white border-none outline-none font-bold text-lg mb-3 shadow-sm placeholder:text-slate-300">
                        <input id="in-vi" placeholder="Nghĩa tinh tế..." class="w-full p-4 rounded-2xl bg-white/80 border-none outline-none text-indigo-600 font-semibold shadow-sm placeholder:text-indigo-200">
                        <button onclick="addSingle()" class="w-full mt-4 py-4 bg-indigo-600 text-white rounded-2xl font-black text-sm shadow-lg shadow-indigo-200 active:scale-95 transition-all uppercase tracking-widest">Lưu từ vựng</button>
                    </div>
                    
                    <div class="flex-grow flex flex-col">
                        <p class="text-[9px] font-black text-slate-400 mb-3 uppercase tracking-[0.2em]">Nhập lô (từ : nghĩa)</p>
                        <textarea id="bulk-input" class="flex-grow w-full p-5 bg-slate-50 border-none rounded-[30px] outline-none text-sm font-medium text-slate-600 shadow-inner placeholder:text-slate-300" placeholder="apple : quả táo&#10;hand down : truyền lại"></textarea>
                        <button onclick="handleImport()" class="w-full mt-4 py-4 bg-slate-800 text-white rounded-2xl font-black text-sm uppercase active:scale-95 transition-all tracking-widest shadow-xl">Nhập toàn bộ</button>
                    </div>
                </div>
            `;
            
            const enInput = document.getElementById('in-en');
            let timer;
            enInput.oninput = () => {
                clearTimeout(timer);
                timer = setTimeout(async () => {
                    const val = enInput.value.trim();
                    if(val) document.getElementById('in-vi').value = await translate(val);
                }, 500);
            };
        }

        function addSingle() {
            const en = document.getElementById('in-en').value.trim();
            const vi = document.getElementById('in-vi').value.trim();
            if(en && vi) {
                db.data.push({ id: Date.now(), en, vi });
                db.save();
                router('add');
            }
        }

        function handleImport() {
            const input = document.getElementById('bulk-input').value;
            let count = 0;
            input.split('\n').forEach(line => {
                const parts = line.split(':');
                if (parts.length >= 2) {
                    const en = parts[0].trim(), vi = parts[1].trim();
                    if (en && vi) {
                        db.data.push({ id: Date.now() + Math.random(), en, vi });
                        count++;
                    }
                }
            });
            db.save();
            router('list');
        }

        function renderStudy(v) {
            if (db.data.length === 0) return v.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-300 font-black italic animate-pulse">KHO ĐANG TRỐNG...</div>`;
            if (state.queue.length === 0 || state.idx >= state.queue.length) {
                state.queue = [...db.data].sort(() => Math.random() - 0.5);
                state.idx = 0;
            }
            const item = state.queue[state.idx];
            state.flipped = false;
            v.innerHTML = `
                <div class="h-full flex flex-col animate-in zoom-in-95 duration-300">
                    <div class="card" onclick="flip()">
                        <div id="card-inner" class="card-inner">
                            <div class="face shadow-sm">${item.en}</div>
                            <div class="face face-back shadow-indigo-200 shadow-2xl">
                                <span class="text-xs uppercase tracking-[0.3em] opacity-60 mb-4">Nghĩa là</span>
                                <div class="text-3xl">${item.vi}</div>
                            </div>
                        </div>
                    </div>
                    <button onclick="next()" class="w-full mt-auto py-5 bg-slate-900 text-white rounded-[28px] font-black text-xl shadow-2xl active:scale-95 transition-all">TIẾP THEO</button>
                </div>
            `;
        }

        function flip() {
            state.flipped = !state.flipped;
            const el = document.getElementById('card-inner');
            if(el) el.classList.toggle('is-flipped', state.flipped);
        }

        function next() {
            if (!state.flipped) flip();
            else { state.idx++; renderStudy(document.getElementById('app')); }
        }

        function renderList(v) {
            const items = db.data.slice().reverse().map(item => `
                <div class="flex justify-between items-center p-5 border-b border-slate-50 hover:bg-slate-50 transition-colors rounded-2xl mb-1">
                    <div class="text-sm"><b class="text-indigo-600 font-bold">${item.en}</b> <span class="text-slate-300 mx-2">•</span> <span class="text-slate-500">${item.vi}</span></div>
                    <button onclick="deleteItem(${item.id})" class="w-8 h-8 flex items-center justify-center bg-rose-50 text-rose-400 rounded-full hover:bg-rose-500 hover:text-white transition-all text-[10px] font-black">X</button>
                </div>
            `).join('');
            v.innerHTML = `<div class="h-full overflow-y-auto custom-scroll">${items || '<p class="text-center mt-10 opacity-20 font-bold">Trống</p>'}</div>`;
        }

        function deleteItem(id) {
            if(confirm("Xóa từ này?")) {
                db.data = db.data.filter(i => i.id !== id);
                db.save();
                router('list');
            }
        }

        window.onkeydown = (e) => {
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') {
                if(e.key === 'Enter' && e.target.id === 'in-en') addSingle();
                return;
            }
            if (e.code === 'Space' || e.key === 'Enter') {
                if (state.view === 'study') { e.preventDefault(); next(); }
            }
        };

        router('study');
    </script>
</body>
</html>
