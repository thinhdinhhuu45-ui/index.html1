 <!DOCTYPE html>

<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KP v-PRO | THE FINAL GATE</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        body { font-family: ui-sans-serif, system-ui, sans-serif; background: #f8fafc; color: #0f172a; }

        .tab-active { background: #1e293b !important; color: white !important; border-color: #1e293b !important; }

        .card-side { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 320px; background: white; border: 2px solid #e2e8f0; border-radius: 16px; width: 100%; }

        .heat-map { display: grid; grid-template-columns: repeat(21, 1fr); gap: 2px; }

        .heat-cell { height: 8px; border-radius: 1px; background: #e2e8f0; transition: background 0.3s; }

        * { transition: none !important; } /* Zero Latency: Triệt tiêu độ trễ */

        .hidden { display: none !important; }

        .custom-scroll::-webkit-scrollbar { display: none; }

    </style>

</head>

<body class="flex justify-center p-2 sm:p-4">



    <div class="w-full max-w-lg flex flex-col h-[98dvh]">

        <header class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm flex justify-between items-center mb-2">

            <div class="flex items-center gap-4">

                <span class="font-black text-orange-500 text-lg">🔥 <span id="streak">0</span></span>

                <span id="mastery" class="text-[10px] font-black bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-md border border-indigo-100 uppercase tracking-tighter">MSTRY: 0%</span>

            </div>

            <div id="heatmap" class="heat-map w-32"></div>

            <div class="text-[10px] font-mono text-slate-400 font-bold" id="stats-total">0 UNITS</div>

        </header>



        <main id="view" class="flex-grow overflow-hidden relative"></main>



        <nav class="mt-2 grid grid-cols-4 gap-1.5">

            <button onclick="Core.route('study')" id="n-study" class="bg-white border border-slate-200 py-3.5 rounded-xl font-bold text-slate-500 text-xs uppercase tracking-tight">Study [S]</button>

            <button onclick="Core.route('nexus')" id="n-nexus" class="bg-white border border-slate-200 py-3.5 rounded-xl font-bold text-slate-500 text-xs uppercase tracking-tight">Nexus [N]</button>

            <button onclick="Core.route('vault')" id="n-vault" class="bg-white border border-slate-200 py-3.5 rounded-xl font-bold text-slate-500 text-xs uppercase tracking-tight">Vault [V]</button>

            <button onclick="Core.route('data')" id="n-data" class="bg-white border border-slate-200 py-3.5 rounded-xl font-bold text-slate-400 text-[10px] uppercase">Data</button>

        </nav>

    </div>



    <script>

        // --- CƠ SỞ DỮ LIỆU & LOGIC ---

        const DB = {

            vocab: JSON.parse(localStorage.getItem('KP_PRO_VOCAB')) || [],

            meta: JSON.parse(localStorage.getItem('KP_PRO_META')) || { streak: 0, lastDate: null, history: {} },

            save() {

                localStorage.setItem('KP_PRO_VOCAB', JSON.stringify(this.vocab));

                localStorage.setItem('KP_PRO_META', JSON.stringify(this.meta));

                this.updateUI();

            },

            updateUI() {

                document.getElementById('streak').innerText = this.meta.streak;

                document.getElementById('stats-total').innerText = this.vocab.length + " UNITS";

                const mastered = this.vocab.filter(i => i.ef > 3.2).length;

                document.getElementById('mastery').innerText = `MSTRY: ${this.vocab.length ? Math.round(mastered/this.vocab.length*100) : 0}%`;

                this.renderHeatmap();

            },

            renderHeatmap() {

                const h = document.getElementById('heatmap'); h.innerHTML = '';

                const today = new Date();

                for(let i=20; i>=0; i--) {

                    const d = new Date(); d.setDate(today.getDate() - i);

                    const count = this.meta.history[d.toDateString()] || 0;

                    const cell = document.createElement('div');

                    cell.className = 'heat-cell';

                    if(count > 0) cell.style.background = `rgba(79, 70, 229, ${Math.min(0.2 + count * 0.15, 1)})`;

                    h.appendChild(cell);

                }

            }

        };



        const Core = {

            state: { view: '', flipped: false, queue: [] },

            

            route(v) {

                this.state.view = v; this.state.flipped = false;

                document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));

                const btn = document.getElementById('n-'+v); if(btn) btn.classList.add('tab-active');

                const port = document.getElementById('view'); port.innerHTML = '';

                

                if (v === 'study') this.renderStudy(port);

                if (v === 'nexus') this.renderNexus(port);

                if (v === 'vault') this.renderVault(port);

                if (v === 'data') this.renderData(port);

                DB.save();

            },



            // --- HỌC TẬP (STUDY MODE) ---

            renderStudy(v) {

                this.state.queue = DB.vocab.filter(i => i.next <= Date.now()).sort((a,b) => a.next - b.next);

                if(this.state.queue.length === 0) {

                    v.innerHTML = `<div class="card-side text-slate-400 font-bold border-dashed text-sm uppercase tracking-widest px-10 text-center">Tất cả từ hôm nay đã xong! Quay lại sau nhé.</div>`;

                    return;

                }

                const item = this.state.queue[0];

                v.innerHTML = `

                    <div id="study-card" class="h-full flex flex-col">

                        <div class="relative cursor-pointer" onclick="Core.flip()">

                            <div id="card-front" class="card-side shadow-sm p-6 text-center">

                                <h2 class="text-4xl font-black mb-2 tracking-tighter uppercase">${item.en}</h2>

                                <p class="text-slate-400 font-mono text-sm">${item.ipa||''}</p>

                            </div>

                            <div id="card-back" class="card-side shadow-sm p-6 text-center hidden border-indigo-200 bg-indigo-50/30">

                                <h2 class="text-3xl font-bold text-indigo-600 mb-4 tracking-tight">${item.vi}</h2>

                                <p class="text-xs text-slate-500 italic px-6 leading-relaxed">${item.ex || 'Không có ví dụ.'}</p>

                            </div>

                        </div>

                        <div id="study-controls" class="grid grid-cols-4 gap-1.5 mt-2 opacity-20 pointer-events-none">

                            <button onclick="Core.ans(0)" class="bg-white border-2 border-slate-200 py-4 font-black text-[10px] rounded-xl hover:bg-slate-50">1: AGAIN</button>

                            <button onclick="Core.ans(1)" class="bg-white border-2 border-slate-200 py-4 font-black text-[10px] rounded-xl hover:bg-slate-50">2: HARD</button>

                            <button onclick="Core.ans(3)" class="bg-white border-2 border-slate-200 py-4 font-black text-[10px] rounded-xl hover:bg-slate-50">3: GOOD</button>

                            <button onclick="Core.ans(5)" class="bg-indigo-600 text-white py-4 font-black text-[10px] rounded-xl shadow-lg shadow-indigo-200">4: EASY</button>

                        </div>

                        <p class="text-[9px] text-center mt-3 text-slate-400 font-bold uppercase tracking-[0.2em]">Space/F: Lật | 1-4: Đánh giá</p>

                    </div>`;

            },



            flip() {

                if (this.state.view !== 'study' || this.state.queue.length === 0) return;

                const front = document.getElementById('card-front');

                const back = document.getElementById('card-back');

                const ctrl = document.getElementById('study-controls');

                this.state.flipped = !this.state.flipped;

                

                if(front && back && ctrl) {

                    front.classList.toggle('hidden', this.state.flipped);

                    back.classList.toggle('hidden', !this.state.flipped);

                    ctrl.classList.toggle('opacity-20', !this.state.flipped);

                    ctrl.classList.toggle('pointer-events-none', !this.state.flipped);

                }

            },



            ans(q) {

                if(!this.state.flipped) return; // Bảo mật thuật toán: Chỉ đánh giá khi đã lật

                const item = this.state.queue[0];

                let { reps, ef, interval: i } = item;

                

                if (q >= 3) {

                    if (reps === 0) i = 1; else if (reps === 1) i = 4; else i = Math.round(i * ef);

                    reps++;

                } else { reps = 0; i = 1; }

                

                ef = Math.max(1.3, ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));

                

                // Thuật toán: Nếu Again (q=0) hiện lại sau 10 phút, còn lại theo ngày + fuzzing

                const delay = (q === 0) ? 600000 : (i * (0.95 + Math.random() * 0.1)) * 86400000;

                

                Object.assign(item, { reps, ef, interval: i, next: Date.now() + delay });

                

                const today = new Date().toDateString();

                DB.meta.history[today] = (DB.meta.history[today] || 0) + 1;

                this.updateStreak(); this.route('study');

            },



            // --- NHẬP LIỆU (NEXUS MODE) ---

            renderNexus(v) {

                v.innerHTML = `

                    <div class="bg-white border border-slate-200 p-6 rounded-2xl flex flex-col gap-4">

                        <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nhập từ mới</div>

                        <input id="in-en" autocomplete="off" placeholder="Tiếng Anh..." class="w-full p-4 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500 font-bold text-xl">

                        <input id="in-vi" autocomplete="off" placeholder="Nghĩa..." class="w-full p-4 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500 font-bold text-indigo-600 text-lg">

                        <div id="nexus-info" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest min-h-[15px] ml-1"></div>

                        <button onclick="Core.add()" class="bg-indigo-600 text-white py-4.5 rounded-xl font-black uppercase text-xs tracking-widest shadow-lg active:scale-95">Thêm vào Vault [Enter]</button>

                    </div>

                    <textarea id="bulk" class="w-full h-32 mt-2 p-4 outline-none text-xs font-mono bg-white border border-slate-100 rounded-2xl custom-scroll" placeholder="Nhập nhanh (từ : nghĩa)"></textarea>`;

                

                setTimeout(() => document.getElementById('in-en').focus(), 10);

                

                const en = document.getElementById('in-en');

                en.oninput = async () => {

                    const val = en.value.trim();

                    if(val.length > 1) {

                        const [t, i] = await Promise.all([

                            fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${val}`).then(r => r.json()),

                            fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${val}`).then(r => r.json()).catch(() => null)

                        ]);

                        document.getElementById('in-vi').value = t?.[0]?.[0]?.[0]?.toLowerCase() || '';

                        const entry = i?.[0];

                        window.curInf = { ipa: entry?.phonetic || '', ex: entry?.meanings?.[0]?.definitions?.find(d => d.example)?.example || '' };

                        document.getElementById('nexus-info').innerText = window.curInf.ipa || 'IPA: ...';

                    }

                };

            },



            add() {

                const en = document.getElementById('in-en')?.value.trim();

                const vi = document.getElementById('in-vi')?.value.trim();

                if(!en || !vi) return;

                DB.vocab.push({ id: Date.now(), en, vi, ipa: window.curInf?.ipa || '', ex: window.curInf?.ex || '', reps: 0, ef: 2.5, interval: 0, next: Date.now() });

                window.curInf = null; 

                document.getElementById('in-en').value = ''; 

                document.getElementById('in-vi').value = '';

                document.getElementById('in-en').focus(); 

                DB.save();

            },



            // --- KHO LƯU TRỮ (VAULT MODE) ---

            renderVault(v) {

                v.innerHTML = `<input id="v-search" oninput="Core.search(this.value)" placeholder="Tìm kiếm trong kho..." class="w-full p-4 mb-2 border-2 border-slate-100 rounded-xl outline-none text-sm font-bold"><div id="v-list" class="overflow-y-auto max-h-[65vh] custom-scroll flex flex-col gap-1.5"></div>`;

                this.search('');

            },



            search(q) {

                const list = document.getElementById('v-list');

                const query = q.toLowerCase();

                list.innerHTML = DB.vocab.filter(i => i.en.toLowerCase().includes(query) || i.vi.includes(query)).slice().reverse().map(i => `

                    <div class="flex justify-between items-center p-4 bg-white border border-slate-100 rounded-xl">

                        <div class="text-sm font-black text-slate-700">${i.en} <span class="text-indigo-400 ml-1 font-bold">/ ${i.vi}</span></div>

                        <button onclick="Core.del(${i.id})" class="text-rose-400 text-[10px] font-black uppercase tracking-tighter hover:text-rose-600">Xóa</button>

                    </div>`).join('');

            },



            del(id) {

                const backup = [...DB.vocab];

                const item = DB.vocab.find(i => i.id === id);

                DB.vocab = DB.vocab.filter(i => i.id !== id);

                DB.save(); this.search(document.getElementById('v-search')?.value || '');

                

                const toast = document.createElement('div');

                toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-2xl text-[10px] font-black shadow-2xl flex gap-4 items-center z-50";

                toast.innerHTML = `ĐÃ XÓA: ${item.en.toUpperCase()} <button id="undo-btn" class="text-indigo-400 underline tracking-widest">HOÀN TÁC</button>`;

                document.body.appendChild(toast);

                

                const timer = setTimeout(() => toast.remove(), 3000);

                document.getElementById('undo-btn').onclick = () => {

                    clearTimeout(timer); DB.vocab = backup; DB.save(); this.search(''); toast.remove();

                };

            },



            // --- HỆ THỐNG DATA ---

            renderData(v) {

                v.innerHTML = `<div class="bg-white p-8 rounded-2xl flex flex-col gap-4 border border-slate-100">

                    <button onclick="Core.export()" class="w-full py-5 bg-indigo-50 text-indigo-600 font-black rounded-xl text-xs tracking-widest border border-indigo-100">XUẤT DỮ LIỆU (.JSON)</button>

                    <button onclick="document.getElementById('imp').click()" class="w-full py-5 bg-slate-50 text-slate-600 font-black rounded-xl text-xs tracking-widest">NHẬP DỮ LIỆU</button>

                    <input type="file" id="imp" onchange="Core.import(this)" class="hidden">

                    <div class="mt-10 border-t pt-4">

                        <button onclick="if(confirm('Xóa sạch kho từ?')){localStorage.clear();location.reload()}" class="w-full text-rose-300 text-[10px] font-black uppercase tracking-widest">Xóa toàn bộ bộ nhớ</button>

                    </div>

                </div>`;

            },



            updateStreak() {

                const today = new Date().toDateString();

                if(DB.meta.lastDate !== today) {

                    const last = new Date(DB.meta.lastDate);

                    DB.meta.streak = ((new Date() - last) / 86400000 <= 1.5) ? DB.meta.streak + 1 : 1;

                    DB.meta.lastDate = today;

                }

            },



            export() {

                const b = new Blob([JSON.stringify({v: DB.vocab, m: DB.meta})], {type: 'application/json'});

                const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'Vocabulary_Backup.json'; a.click();

            },



            import(el) {

                const r = new FileReader(); r.onload = (e) => {

                    const d = JSON.parse(e.target.result); DB.vocab = d.v; DB.meta = d.m; DB.save(); location.reload();

                }; r.readAsText(el.files[0]);

            }

        };



        // --- KEYBOARD ENGINE (Bộ não phím tắt) ---

        window.onkeydown = (e) => {

            if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {

                if (e.key === 'Enter' && e.target.id === 'in-en') Core.add();

                return;

            }

            const key = e.key.toLowerCase();

            if (key === 's') Core.route('study');

            if (key === 'n') Core.route('nexus');

            if (key === 'v') Core.route('vault');

            

            if (Core.state.view === 'study' && Core.state.queue.length > 0) {

                if (e.code === 'Space' || key === 'f') { e.preventDefault(); Core.flip(); }

                if (Core.state.flipped) {

                    if (key === '1') Core.ans(0); if (key === '2') Core.ans(1);

                    if (key === '3') Core.ans(3); if (key === '4') Core.ans(5);

                }

            }

        };



        // Khởi động

        Core.route('study');

    </script>

</body>

</html>
