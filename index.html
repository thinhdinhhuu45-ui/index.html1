<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KP v-PRO MAX | TEAL EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#09090b', // Zinc-950
                            card: '#18181b', // Zinc-900
                            primary: '#14b8a6', // Teal-500
                            text: '#d4d4d8', // Zinc-300
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: ui-sans-serif, system-ui, sans-serif; transition: all 0.3s; }
        .tab-active { background: #14b8a6 !important; color: #09090b !important; border-color: #14b8a6 !important; font-weight: 900 !important; }
        .card-side { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 320px; border-radius: 20px; width: 100%; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .heat-map { display: grid; grid-template-columns: repeat(21, 1fr); gap: 2px; }
        .heat-cell { height: 8px; border-radius: 1px; background: #27272a; }
        .custom-scroll::-webkit-scrollbar { display: none; }
        .card-glow { box-shadow: 0 0 25px rgba(20, 184, 166, 0.03); }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 dark:bg-brand-bg dark:text-brand-text flex justify-center p-2 sm:p-4">
    <div class="w-full max-w-lg flex flex-col h-[98dvh]">
        <header class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 p-4 rounded-2xl shadow-sm flex justify-between items-center mb-3">
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <span class="font-black text-amber-500 text-lg">🔥 <span id="streak">0</span></span>
                    <span class="text-[9px] font-black px-2 py-0.5 rounded-full uppercase tracking-tighter bg-zinc-100 dark:bg-zinc-800 text-zinc-500">FSRS v5</span>
                </div>
                <div id="mastery" class="text-[9px] font-bold text-zinc-400 mt-1 uppercase tracking-widest">STABILITY MAX: 0</div>
            </div>
            <div class="flex items-center gap-4">
                <div id="heatmap" class="heat-map w-16 sm:w-20"></div>
                <button onclick="Core.toggleTheme()" class="p-2 rounded-xl bg-zinc-100 dark:bg-zinc-800 hover:scale-110 transition-transform">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <main id="view" class="flex-grow overflow-hidden relative"></main>

        <nav class="mt-3 grid grid-cols-4 gap-2">
            <button onclick="Core.route('study')" id="n-study" class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 py-3.5 rounded-xl font-bold text-zinc-500 dark:text-zinc-400 text-xs uppercase tracking-tight">Study</button>
            <button onclick="Core.route('nexus')" id="n-nexus" class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 py-3.5 rounded-xl font-bold text-zinc-500 dark:text-zinc-400 text-xs uppercase tracking-tight">Nexus</button>
            <button onclick="Core.route('vault')" id="n-vault" class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 py-3.5 rounded-xl font-bold text-zinc-500 dark:text-zinc-400 text-xs uppercase tracking-tight">Vault</button>
            <button onclick="Core.route('data')" id="n-data" class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 py-3.5 rounded-xl font-bold text-zinc-400 text-[10px] uppercase tracking-tight">Data</button>
        </nav>
    </div>

    <script>
        const W = [0.4022, 0.9485, 2.5157, 14.2658, 4.9157, 1.0567, 0.9313, 0.0151, 1.636, 0.137, 1.0114, 2.21, 0.0805, 0.3125, 2.1226, 0.2464, 2.107, 0.5046, 0.9347];

        const DB = {
            vocab: [],
            meta: { streak: 0, lastDate: null, history: {}, speechRate: 0.9, retention: 0.9, dark: true },
            cache: new Map(), timer: null,
            async init() {
                return new Promise((resolve) => {
                    const request = indexedDB.open("KP_PRO_MAX", 1);
                    request.onupgradeneeded = (e) => { e.target.result.createObjectStore("store"); };
                    request.onsuccess = async (e) => {
                        this.idb = e.target.result;
                        const store = this.idb.transaction("store", "readonly").objectStore("store");
                        const v = await new Promise(r => store.get("vocab").onsuccess = e => r(e.target.result));
                        const m = await new Promise(r => store.get("meta").onsuccess = e => r(e.target.result));
                        if (v) this.vocab = v; if (m) Object.assign(this.meta, m);
                        this.applyTheme();
                        resolve();
                    };
                });
            },
            async save() {
                const tx = this.idb.transaction("store", "readwrite");
                tx.objectStore("store").put(this.vocab, "vocab");
                tx.objectStore("store").put(this.meta, "meta");
                this.updateUI();
            },
            applyTheme() {
                if (this.meta.dark) {
                    document.documentElement.classList.add('dark');
                    document.getElementById('theme-icon').innerText = '☀️';
                } else {
                    document.documentElement.classList.remove('dark');
                    document.getElementById('theme-icon').innerText = '🌙';
                }
            },
            updateUI() {
                document.getElementById('streak').innerText = this.meta.streak;
                const active = this.vocab.filter(i => !i.trash);
                const maxS = active.length ? Math.max(...active.map(i => i.s || 0)) : 0;
                document.getElementById('mastery').innerText = `STABILITY MAX: ${Math.round(maxS)} DAYS`;
                const h = document.getElementById('heatmap'); if(!h) return;
                h.innerHTML = '';
                const today = new Date();
                for(let i=15; i>=0; i--) {
                    const d = new Date(); d.setDate(today.getDate() - i);
                    const count = this.meta.history[d.toDateString()] || 0;
                    const cell = document.createElement('div');
                    cell.className = 'heat-cell';
                    if(count > 0) cell.style.background = `rgba(20, 184, 166, ${Math.min(0.2 + count * 0.15, 1)})`;
                    h.appendChild(cell);
                }
            }
        };

        const Core = {
            state: { view: '', flipped: false, queue: [], isTrashView: false },
            toggleTheme() { DB.meta.dark = !DB.meta.dark; DB.applyTheme(); DB.save(); },
            speak(txt) { window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(txt); msg.lang = 'en-US'; msg.rate = DB.meta.speechRate || 0.9; window.speechSynthesis.speak(msg); },
            route(v) {
                this.state.view = v; this.state.flipped = false; this.state.isTrashView = false;
                document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
                const btn = document.getElementById('n-'+v); if(btn) btn.classList.add('tab-active');
                const port = document.getElementById('view'); port.innerHTML = '';
                if (v === 'study') this.renderStudy(port);
                else if (v === 'nexus') this.renderNexus(port);
                else if (v === 'vault') this.renderVault(port);
                else if (v === 'data') this.renderData(port);
            },
            renderStudy(v) {
                this.state.queue = DB.vocab.filter(i => !i.trash && i.next <= Date.now()).sort((a,b) => a.next - b.next);
                if(!this.state.queue.length) {
                    v.innerHTML = `<div class="card-side text-zinc-500 font-black border-2 border-dashed border-zinc-200 dark:border-zinc-800 text-[10px] uppercase px-12 text-center">Hero nghỉ ngơi thôi! 📐</div>`;
                    return;
                }
                const item = this.state.queue[0];
                const needsTyping = item.reps < 2;

                v.innerHTML = `
                    <div class="h-full flex flex-col">
                        <div class="relative cursor-pointer" onclick="Core.flip()">
                            <div id="card-front" class="card-side bg-white dark:bg-zinc-900 card-glow border border-zinc-200 dark:border-zinc-800 p-6 text-center">
                                <h2 class="text-5xl font-black mb-3 tracking-tighter uppercase text-zinc-800 dark:text-zinc-100">${item.en}</h2>
                                ${needsTyping ? '<div class="mt-4 px-3 py-1 bg-teal-500/10 text-teal-500 text-[8px] font-black rounded-full uppercase">Recall Mode</div>' : ''}
                            </div>
                            <div id="card-back" class="card-side shadow-sm p-6 text-center hidden border-teal-500/30 bg-teal-500/5 dark:bg-teal-500/5">
                                <h2 class="text-3xl font-black text-teal-600 dark:text-teal-400 leading-tight">${item.vi}</h2>
                                <p class="text-zinc-400 font-mono text-xs mt-4 uppercase">${item.ipa||''}</p>
                                ${needsTyping ? `<input id="recall-input" autocomplete="off" placeholder="Gõ lại..." class="mt-6 w-full max-w-[200px] p-2 border-b-2 border-teal-500/30 bg-transparent outline-none text-center font-black uppercase text-teal-500">` : ''}
                            </div>
                        </div>
                        <div id="study-controls" class="grid grid-cols-4 gap-2 mt-3 opacity-20 pointer-events-none transition-opacity">
                            <button onclick="Core.ans(1)" class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 py-4 font-black text-[9px] rounded-xl text-zinc-400">AGAIN</button>
                            <button onclick="Core.ans(2)" class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 py-4 font-black text-[9px] rounded-xl text-zinc-400">HARD</button>
                            <button onclick="Core.ans(3)" class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 py-4 font-black text-[9px] rounded-xl text-zinc-400">GOOD</button>
                            <button onclick="Core.ans(4)" class="bg-teal-500 text-zinc-950 py-4 font-black text-[9px] rounded-xl shadow-lg shadow-teal-500/20">EASY</button>
                        </div>
                    </div>`;
                if(needsTyping) setTimeout(() => { const inp = document.getElementById('recall-input'); if(inp) { inp.focus(); inp.oninput = (e) => { if(e.target.value.toLowerCase().trim() === item.en.toLowerCase().trim()){ e.target.classList.add('text-teal-500'); e.target.disabled = true; } }; } }, 100);
            },
            flip() {
                if (this.state.view !== 'study' || !this.state.queue.length) return;
                this.state.flipped = !this.state.flipped;
                document.getElementById('card-front')?.classList.toggle('hidden', this.state.flipped);
                document.getElementById('card-back')?.classList.toggle('hidden', !this.state.flipped);
                document.getElementById('study-controls')?.classList.remove('opacity-20', 'pointer-events-none');
                if(this.state.flipped) { this.speak(this.state.queue[0].en); const inp = document.getElementById('recall-input'); if (inp) inp.focus(); }
            },
            ans(g) {
                if(!this.state.flipped) return;
                const item = this.state.queue[0];
                const inp = document.getElementById('recall-input');
                if (inp && !inp.disabled && g > 1) return;
                let { s, d, reps, laps } = item;
                if (s === undefined) { s = 0; d = 0; reps = 0; laps = 0; }
                if (reps === 0) { s = W[g - 1]; d = W[4] - (g - 3) * W[5]; } else {
                    const r = Math.exp(Math.log(0.9) * (item.interval / s));
                    d = Math.min(10, Math.max(1, d - W[6] * (g - 3)));
                    d = W[4] - W[5] * (g - 3) + (d - W[4]) * W[7];
                    if (g === 1) { s = W[11] * Math.pow(d, -W[12]) * (Math.pow(s + 1, W[13]) - 1) * Math.exp(W[14] * (1 - r)); laps++; }
                    else { const h = (g === 2) ? W[15] : (g === 4) ? W[16] : 1; s = s * (1 + Math.exp(W[8]) * (11 - d) * Math.pow(s, -W[9]) * (Math.exp(W[10] * (1 - r)) - 1) * h); }
                }
                reps++;
                const target = DB.meta.retention || 0.9;
                let i = s / Math.log(0.9) * Math.log(target);
                let finalI = Math.max(1, Math.round(i * (0.95 + Math.random() * 0.1)));
                if (g === 1) finalI = 1;
                item.next = Date.now() + (finalI * 86400000);
                Object.assign(item, { s, d, reps, laps, interval: finalI });
                const ds = new Date().toDateString(); DB.meta.history[ds] = (DB.meta.history[ds]||0)+1;
                this.updateStreak(); DB.save(); this.route('study');
            },
            renderNexus(port) {
                port.innerHTML = `
                <div class="h-full flex flex-col gap-3">
                    <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 p-4 rounded-2xl flex flex-col gap-3">
                        <input id="in-en" autocomplete="off" placeholder="TỪ TIẾNG ANH..." class="w-full p-3 bg-zinc-50 dark:bg-zinc-800 dark:text-white border-2 border-transparent rounded-xl outline-none focus:border-teal-500 font-black text-xl uppercase tracking-tighter">
                        <input id="in-vi" autocomplete="off" placeholder="NGHĨA..." class="w-full p-3 bg-zinc-50 dark:bg-zinc-800 dark:text-white border-2 border-transparent rounded-xl outline-none focus:border-teal-500 font-bold text-teal-500">
                        <button onclick="Core.add()" class="bg-zinc-900 dark:bg-teal-500 dark:text-zinc-950 py-3 rounded-xl font-black uppercase text-[10px]">LƯU ĐƠN [ENTER]</button>
                    </div>
                    <div class="bg-teal-500/5 border border-teal-500/20 p-4 rounded-2xl flex-grow flex flex-col">
                        <label class="text-[9px] font-black text-teal-600 dark:text-teal-500 uppercase tracking-widest mb-2 block">NHẬP NHANH (ANH:VIỆT)</label>
                        <textarea id="in-batch" placeholder="hi:chào&#10;hello:xin chào" class="flex-grow w-full p-4 bg-white/50 dark:bg-zinc-900/50 dark:text-teal-100 border-2 border-white dark:border-zinc-800 rounded-xl outline-none focus:border-teal-500 font-bold text-sm custom-scroll"></textarea>
                        <button onclick="Core.batchAdd()" class="mt-2 bg-teal-600 text-white py-3 rounded-xl font-black uppercase text-[10px]">LƯU TẤT CẢ</button>
                    </div>
                </div>`;
                const en = document.getElementById('in-en'); en.focus();
                en.oninput = () => {
                    const val = en.value.trim().toLowerCase(); if(val.length < 2) return;
                    if(DB.cache.has(val)) { document.getElementById('in-vi').value = DB.cache.get(val).vi; return; }
                    clearTimeout(DB.timer);
                    DB.timer = setTimeout(async () => {
                        try {
                            const [t, i] = await Promise.all([
                                fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${encodeURIComponent(val)}`).then(r => r.json()),
                                fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${val}`).then(r => r.json()).catch(() => null)
                            ]);
                            const mean = t?.[0]?.[0]?.[0] || ''; const ipa = i?.[0]?.phonetic || '';
                            DB.cache.set(val, {vi: mean, ipa}); document.getElementById('in-vi').value = mean; window.curInf = {ipa};
                        } catch(e) {}
                    }, 450);
                };
            },
            add() {
                const en = document.getElementById('in-en')?.value.trim();
                const vi = document.getElementById('in-vi')?.value.trim();
                if(!en || !vi) return;
                DB.vocab.push({ id: Date.now() + Math.random(), en, vi, ipa: window.curInf?.ipa || '', reps: 0, s: 0, d: 0, laps: 0, interval: 0, next: Date.now(), trash: false });
                DB.save(); this.speak(en); document.getElementById('in-en').value = ''; document.getElementById('in-vi').value = ''; document.getElementById('in-en').focus();
            },
            batchAdd() {
                const area = document.getElementById('in-batch');
                const lines = area.value.split('\n'); let count = 0;
                lines.forEach(line => {
                    if (line.includes(':')) {
                        const [en, vi] = line.split(':');
                        if (en.trim() && vi.trim()) {
                            DB.vocab.push({ id: Date.now() + Math.random(), en: en.trim(), vi: vi.trim(), ipa: '', reps: 0, s: 0, d: 0, laps: 0, interval: 0, next: Date.now(), trash: false });
                            count++;
                        }
                    }
                });
                if (count > 0) { DB.save(); area.value = ''; alert(`Đã nạp ${count} từ!`); }
            },
            renderVault(v) {
                v.innerHTML = `
                <div class="flex flex-col gap-2 mb-3">
                    <input id="v-search" oninput="Core.search(this.value)" placeholder="TÌM KIẾM..." class="w-full p-4 bg-white dark:bg-zinc-900 dark:text-white border border-zinc-200 dark:border-zinc-800 rounded-xl outline-none text-sm font-bold shadow-sm">
                    <div class="flex gap-2">
                        <button onclick="Core.toggleTrash()" id="trash-btn" class="flex-grow py-3 bg-zinc-100 dark:bg-zinc-800 text-zinc-500 rounded-xl font-black text-[10px] uppercase">THÙNG RÁC</button>
                        <button onclick="Core.clearVault()" class="px-6 py-3 bg-rose-500/10 text-rose-500 border border-rose-500/20 rounded-xl font-black text-[10px] uppercase">XÓA HẾT</button>
                    </div>
                </div>
                <div id="v-list" class="overflow-y-auto max-h-[60vh] custom-scroll flex flex-col gap-2"></div>`;
                this.search('');
            },
            clearVault() {
                const isT = this.state.isTrashView;
                if(!confirm(isT ? "XÓA VĨNH VIỄN?" : "CHUYỂN HẾT VÀO THÙNG RÁC?")) return;
                if(isT) DB.vocab = DB.vocab.filter(i => !i.trash); else DB.vocab.forEach(i => i.trash = true);
                DB.save(); this.search(document.getElementById('v-search').value);
            },
            toggleTrash() {
                this.state.isTrashView = !this.state.isTrashView;
                const btn = document.getElementById('trash-btn');
                btn.innerText = this.state.isTrashView ? "QUAY LẠI" : "THÙNG RÁC";
                btn.className = this.state.isTrashView ? "flex-grow py-3 bg-amber-500 text-zinc-950 rounded-xl font-black text-[10px] uppercase" : "flex-grow py-3 bg-zinc-100 dark:bg-zinc-800 text-zinc-500 rounded-xl font-black text-[10px] uppercase";
                this.search(document.getElementById('v-search').value);
            },
            search(q) {
                const list = document.getElementById('v-list'); if(!list) return;
                list.innerHTML = ''; const query = q.toLowerCase().trim();
                const source = DB.vocab.filter(i => {
                    const m = i.en.toLowerCase().includes(query) || i.vi.includes(query);
                    return this.state.isTrashView ? (i.trash && m) : (!i.trash && m);
                });
                source.slice(-50).reverse().forEach(item => {
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center p-4 bg-white dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-800 rounded-xl shadow-sm";
                    if (this.state.isTrashView) {
                        div.innerHTML = `<div class="text-sm font-black text-zinc-500 uppercase">${item.en}</div><div class="flex gap-3"><button onclick="Core.restore(${item.id})" class="text-teal-500 text-[9px] font-black uppercase">RESTORE</button><button onclick="Core.kill(${item.id})" class="text-rose-600 text-[9px] font-black uppercase">KILL</button></div>`;
                    } else {
                        div.innerHTML = `<div class="text-sm font-black text-zinc-700 dark:text-zinc-300 uppercase">${item.en} <span class="text-teal-500 ml-1 font-bold">/ ${item.vi}</span></div><button onclick="Core.moveToTrash(${item.id})" class="text-zinc-400 text-[9px] font-black uppercase">XÓA</button>`;
                    }
                    list.appendChild(div);
                });
            },
            moveToTrash(id) { const i = DB.vocab.find(x => x.id === id); if(i) i.trash = true; DB.save(); this.search(document.getElementById('v-search').value); },
            restore(id) { const i = DB.vocab.find(x => x.id === id); if(i) i.trash = false; DB.save(); this.search(document.getElementById('v-search').value); },
            kill(id) { DB.vocab = DB.vocab.filter(x => x.id !== id); DB.save(); this.search(document.getElementById('v-search').value); },
            renderData(v) {
                v.innerHTML = `<div class="bg-white dark:bg-zinc-900 p-8 rounded-2xl flex flex-col gap-6 border border-zinc-100 dark:border-zinc-800"><div class="p-4 bg-zinc-50 dark:bg-zinc-800 rounded-xl"><label class="text-[9px] font-black text-zinc-400 uppercase block mb-3 text-center">Retention: <span id="r-ret" class="text-teal-500">${Math.round(DB.meta.retention*100)}</span>%</label><input type="range" min="0.8" max="0.97" step="0.01" value="${DB.meta.retention}" class="w-full accent-teal-500" oninput="DB.meta.retention=parseFloat(this.value);document.getElementById('r-ret').innerText=Math.round(this.value*100);DB.save()"></div><div class="p-4 bg-zinc-50 dark:bg-zinc-800 rounded-xl"><label class="text-[9px] font-black text-zinc-400 uppercase block mb-3 text-center">Speech Rate: <span id="r-v" class="text-teal-500">${DB.meta.speechRate}</span>X</label><input type="range" min="0.5" max="1.5" step="0.1" value="${DB.meta.speechRate}" class="w-full accent-teal-500" oninput="DB.meta.speechRate=parseFloat(this.value);document.getElementById('r-v').innerText=this.value;DB.save()"></div><div class="grid grid-cols-2 gap-2"><button onclick="Core.export()" class="py-4 bg-teal-500/10 text-teal-500 font-black rounded-xl text-[10px] uppercase">Export JSON</button><button onclick="document.getElementById('imp').click()" class="py-4 bg-zinc-50 dark:bg-zinc-800 text-zinc-500 font-black rounded-xl text-[10px] uppercase">Import JSON</button></div><input type="file" id="imp" onchange="Core.import(this)" class="hidden"></div>`;
            },
            updateStreak() {
                const t = new Date().toDateString();
                if(DB.meta.lastDate !== t) {
                    const l = new Date(DB.meta.lastDate);
                    DB.meta.streak = ((new Date() - l)/86400000 <= 1.5) ? DB.meta.streak + 1 : 1;
                    DB.meta.lastDate = t;
                }
            },
            export() { const b = new Blob([JSON.stringify({v: DB.vocab, m: DB.meta})], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'KP_DATA.json'; a.click(); },
            import(el) { const r = new FileReader(); r.onload = async (e) => { try { const d = JSON.parse(e.target.result); DB.vocab = d.v; DB.meta = d.m; await DB.save(); location.reload(); } catch(err) { alert("File không hợp lệ!"); } }; r.readAsText(el.files[0]); }
        };

        window.onkeydown = (e) => {
            const k = e.key.toLowerCase(); const focused = document.activeElement;
            if (focused.id === 'in-batch') { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); Core.batchAdd(); } return; }
            const isInInput = ['INPUT', 'TEXTAREA'].includes(focused.tagName);
            if (!isInInput && ['a','s','d','f'].includes(k)) { e.preventDefault(); if(k==='a') Core.route('study'); if(k==='s') Core.route('nexus'); if(k==='d') Core.route('vault'); if(k==='f') Core.route('data'); return; }
            if ((focused.id === 'in-en' || focused.id === 'in-vi') && e.key === 'Enter') Core.add();
            if (Core.state.view === 'study' && Core.state.queue.length) {
                if(e.code === 'Space') { e.preventDefault(); Core.flip(); }
                if(Core.state.flipped && ['1','2','3','4'].includes(k)) Core.ans(parseInt(k));
            }
        };

        DB.init().then(() => { Core.route('study'); DB.updateUI(); });
    </script>
</body>
</html>
