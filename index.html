<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KP STRIKER | FSRS v5 ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, sans-serif; background: #050505; color: #d4d4d8; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .tab-active { background: #14b8a6 !important; color: #000 !important; font-weight: 900 !important; transform: scale(1.05); }
        .card-side { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; border-radius: 40px; width: 100%; border: 1px solid #14b8a622; background: #0f0f0f; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .progress-bar { position: fixed; top: 0; left: 0; height: 4px; background: #14b8a6; transition: width 0.3s; z-index: 100; box-shadow: 0 0 10px #14b8a6; }
        .custom-scroll::-webkit-scrollbar { display: none; }
        
        #app-container { 
            display: flex; flex-direction: column; 
            height: 100dvh; width: 100%; 
            max-width: 800px; 
            padding: 20px; box-sizing: border-box; 
        }
        
        #view { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; margin: 20px 0; }
        
        .w-code-box {
            font-family: 'ui-monospace', 'SFMono-Regular', Menlo, monospace;
            word-break: break-word; 
            white-space: pre-wrap;
            line-height: 1.8;
            letter-spacing: 0.05em;
        }

        button { transition: all 0.2s ease; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="progress" class="progress-bar" style="width: 0%"></div>
    <div id="app-container">
        <header class="bg-zinc-900/50 backdrop-blur-md p-6 rounded-[2.5rem] flex justify-between items-center border border-zinc-800/50 shrink-0 shadow-2xl">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🔥</span>
                <span id="streak" class="font-black text-xl text-amber-500">0</span>
            </div>
            <div id="target-count" class="text-3xl font-black text-teal-500 tracking-tighter">0</div>
        </header>

        <main id="view" class="custom-scroll"></main>

        <nav class="grid grid-cols-4 gap-3 shrink-0 pb-2">
            <button onclick="Core.route('study')" id="n-study" class="bg-zinc-900 py-5 rounded-3xl font-black text-zinc-500 text-xs uppercase tracking-widest border border-zinc-800">Study</button>
            <button onclick="Core.route('nexus')" id="n-nexus" class="bg-zinc-900 py-5 rounded-3xl font-black text-zinc-500 text-xs uppercase tracking-widest border border-zinc-800">Nexus</button>
            <button onclick="Core.route('vault')" id="n-vault" class="bg-zinc-900 py-5 rounded-3xl font-black text-zinc-500 text-xs uppercase tracking-widest border border-zinc-800">Vault</button>
            <button onclick="Core.route('data')" id="n-data" class="bg-zinc-900 py-5 rounded-3xl font-black text-zinc-500 text-[10px] uppercase tracking-widest border border-zinc-800">Data</button>
        </nav>
    </div>

    <script>
        const DEFAULT_W = [0.4022, 0.9485, 2.5157, 14.2658, 4.9157, 1.0567, 0.9313, 0.0151, 1.636, 0.137, 1.0114, 2.21, 0.0805, 0.3125, 2.1226, 0.2464, 2.107, 0.5046, 0.9347];
        
        const DB = {
            idb: null,
            meta: { streak: 0, lastDate: null, retention: 0.9, W: [...DEFAULT_W], backupCount: 0 },
            async init() {
                return new Promise(res => {
                    const req = indexedDB.open("KP_STRIKER_V5_DEEP", 1);
                    req.onupgradeneeded = e => {
                        const db = e.target.result;
                        db.createObjectStore("vocab", { keyPath: "id" });
                        db.createObjectStore("meta");
                    };
                    req.onsuccess = async e => {
                        this.idb = e.target.result;
                        const saved = await this.getMeta();
                        if (saved) this.meta = { ...this.meta, ...saved };
                        res();
                    };
                });
            },
            async getVocab() { return new Promise(r => this.idb.transaction("vocab").objectStore("vocab").getAll().onsuccess = e => r(e.target.result || [])); },
            async saveItem(item) { this.idb.transaction("vocab", "readwrite").objectStore("vocab").put(item); },
            async saveMeta() { this.idb.transaction("meta", "readwrite").objectStore("meta").put(this.meta, "main"); this.updateUI(); },
            async getMeta() { return new Promise(r => this.idb.transaction("meta").objectStore("meta").get("main").onsuccess = e => r(e.target.result)); },
            async deleteItem(id) { this.idb.transaction("vocab", "readwrite").objectStore("vocab").delete(id); },
            updateUI() {
                document.getElementById('streak').innerText = this.meta.streak;
                this.getVocab().then(v => document.getElementById('target-count').innerText = v.filter(i => i.next <= Date.now()).length);
            }
        };

        const Core = {
            state: { view: '', queue: [], initialQueueSize: 0, fsm: 'IDLE' },
            async route(v) {
                this.state.view = v;
                document.querySelectorAll('nav button').forEach(b => b.classList.toggle('tab-active', b.id === 'n-'+v));
                const port = document.getElementById('view'); port.innerHTML = '';
                
                if(v === 'study') {
                    const v_list = await DB.getVocab();
                    this.state.queue = v_list.filter(i => i.next <= Date.now()).sort((a,b) => a.next - b.next);
                    this.state.initialQueueSize = this.state.queue.length;
                    this.renderStudyFrame(port); this.nextCard();
                } 
                else if(v === 'nexus') this.renderNexus(port);
                else if(v === 'vault') this.renderVault(port);
                else if(v === 'data') this.renderData(port);
            },

            renderStudyFrame(v) {
                v.innerHTML = `<div id="study-container" class="h-full flex flex-col justify-between">
                    <div class="cursor-pointer flex-grow flex flex-col" onclick="Core.flip()">
                        <div id="cf" class="card-side p-12 text-center flex-grow"><h2 id="en-disp" class="text-6xl font-black uppercase tracking-tighter text-white"></h2></div>
                        <div id="cb" class="card-side p-12 text-center flex-grow hidden"><h2 id="vi-disp" class="text-4xl font-black text-teal-400"></h2></div>
                    </div>
                    <div id="ctrl" class="grid grid-cols-4 gap-3 mt-6 opacity-0 pointer-events-none transition-all transform translate-y-4">
                        ${[1,2,3,4].map(g => `<button onclick="Core.ans(${g})" class="bg-zinc-900 border border-zinc-800 py-8 rounded-[2rem] text-[10px] font-black uppercase tracking-widest hover:bg-zinc-800 text-zinc-400">${['Again','Hard','Good','Easy'][g-1]}</button>`).join('')}
                    </div>
                </div><div id="empty-msg" class="hidden card-side border-2 border-dashed border-zinc-800 text-sm font-black text-zinc-600 uppercase tracking-[0.2em]">All Clear! ✨</div>`;
            },

            nextCard() {
                if(!this.state.queue.length) {
                    const sc = document.getElementById('study-container'); if(sc) sc.classList.add('hidden');
                    const em = document.getElementById('empty-msg'); if(em) em.classList.remove('hidden');
                    document.getElementById('progress').style.width = '100%'; return;
                }
                const qItem = this.state.queue[0]; const item = qItem.ref || qItem;
                this.state.fsm = 'FRONT';
                document.getElementById('en-disp').innerText = item.en; document.getElementById('vi-disp').innerText = item.vi;
                document.getElementById('cf').classList.remove('hidden'); document.getElementById('cb').classList.add('hidden');
                document.getElementById('ctrl').classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
                document.getElementById('progress').style.width = `${((this.state.initialQueueSize - this.state.queue.length) / this.state.initialQueueSize) * 100}%`;
            },

            flip() { 
                if(this.state.fsm === 'FRONT') { 
                    this.state.fsm = 'BACK'; 
                    document.getElementById('cf').classList.add('hidden'); 
                    document.getElementById('cb').classList.remove('hidden'); 
                    document.getElementById('ctrl').classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4'); 
                } 
            },

            async ans(g) {
                if(this.state.fsm !== 'BACK') return;
                this.state.fsm = 'TRANSITION';
                const qItem = this.state.queue.shift(); const item = qItem.ref || qItem;
                this.calculate(item, g);
                await DB.saveItem(item);
                if(g === 1) this.state.queue.splice(Math.min(2, this.state.queue.length), 0, { ...item, isDebt: true, ref: item });
                else if(!qItem.isDebt) this.updateStreak();
                DB.meta.backupCount++;
                if(DB.meta.backupCount >= 50) { DB.meta.backupCount = 0; this.exp(true); }
                await DB.saveMeta(); this.nextCard();
            },

            calculate(item, g) {
                const now = Date.now();
                const t = item.lastReview ? Math.max(1, Math.floor((now - item.lastReview) / 86400000)) : 0;
                let { s, d, reps, logs = [] } = item; const w = DB.meta.W;
                logs.push({ g, t, s, d, date: now });
                if (reps === 0) {
                    s = w[g - 1]; d = Math.min(Math.max(w[4] - (g - 3) * w[5], 1), 10);
                } else {
                    const r = Math.exp(Math.log(0.9) * (t / s));
                    d = Math.min(Math.max(d - w[6] * (g - 3), 1), 10);
                    d = w[4] * (1 - w[7]) + d * w[7];
                    if (g === 1) s = w[11] * Math.pow(d, -w[12]) * (Math.pow(s + 1, w[13]) - 1) * Math.exp(w[14] * (1 - r));
                    else s = s * (1 + Math.exp(w[8]) * (11 - d) * Math.pow(s, -w[9]) * (Math.exp(w[10] * (1 - r)) - 1) * (g === 2 ? w[15] : 1) * (g === 4 ? w[16] : 1));
                }
                s = Math.max(0.1, isFinite(s) ? s : 0.1); d = Math.min(Math.max(isFinite(d) ? d : 5, 1), 10);
                let ivl = (g === 1) ? (10 / 1440) : Math.max(1, Math.round(s / Math.log(0.9) * Math.log(DB.meta.retention)));
                
                // --- KỊCH BẢN XẤU NHẤT ---
                const deadLine = Math.round(s * (Math.log(0.1) / Math.log(0.9)));
                console.log(`%c[DỰ BÁO] "${item.en}":`, "color: #14b8a6; font-weight: bold");
                console.log(`- Kịch bản đẹp: +${ivl} ngày nữa học lại.`);
                console.log(`- Kịch bản xấu: Quên sạch sau ${deadLine} ngày nếu bỏ học.`);

                if (ivl > 2) ivl = Math.round(ivl + (Math.random() * (ivl * 0.1) - ivl * 0.05));
                Object.assign(item, { s, d, reps: reps + 1, lastReview: now, next: now + (ivl * 86400000), logs });
            },

            updateStreak() {
                const ds = new Date().toDateString();
                if(DB.meta.lastDate !== ds) {
                    const l = new Date(DB.meta.lastDate);
                    DB.meta.streak = (new Date()-l < 172800000) ? DB.meta.streak+1 : 1;
                    DB.meta.lastDate = ds;
                }
            },

            renderNexus(p) {
                p.innerHTML = `<div class="h-full flex flex-col gap-6">
                    <div class="flex-grow flex flex-col bg-zinc-900/50 border border-zinc-800 rounded-[3rem] p-8 shadow-inner">
                        <div class="text-[10px] font-black text-zinc-500 uppercase mb-6 tracking-[0.3em] text-center">Batch Import Engine</div>
                        <textarea id="in-batch" placeholder="word:meaning&#10;hello:xin chào" class="flex-grow w-full bg-transparent text-teal-400 outline-none font-bold text-2xl custom-scroll resize-none placeholder:text-zinc-800"></textarea>
                    </div>
                    <button onclick="Core.batch()" class="bg-teal-500 text-black py-8 rounded-[2rem] font-black uppercase text-sm shadow-xl shadow-teal-500/10">Nạp vào kho lưu trữ</button>
                </div>`;
            },

            async batch() {
                const raw = document.getElementById('in-batch').value;
                if(!raw.trim()) return;
                const lines = raw.split('\n');
                for(let l of lines) {
                    const m = l.match(/^(.*?)(?::|-|=)(.*)$/);
                    if(m && m[1].trim() && m[2].trim()) await DB.saveItem({ id: crypto.randomUUID(), en: m[1].trim(), vi: m[2].trim(), next: Date.now(), reps: 0, s: 0, d: 0, lastReview: 0, logs: [] });
                }
                document.getElementById('in-batch').value = ''; DB.updateUI(); this.route('study');
            },

            async renderVault(v) {
                const vocab = await DB.getVocab();
                v.innerHTML = `<div class="flex flex-col h-full gap-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input id="vault-search" oninput="Core.filterVault()" placeholder="SEARCH VAULT..." class="p-6 bg-zinc-900 border border-zinc-800 text-teal-500 rounded-3xl outline-none font-black text-xs uppercase shadow-2xl">
                        <button onclick="Core.clearAll()" class="bg-red-900/20 border border-red-900/50 text-red-500 rounded-3xl font-black text-[10px] uppercase hover:bg-red-500 hover:text-white transition-all">Clear All Vault</button>
                    </div>
                    <div id="vault-list" class="flex-grow overflow-y-auto custom-scroll flex flex-col gap-3">
                        ${vocab.reverse().map(item => `<div class="vault-card flex justify-between items-center p-6 bg-zinc-900/30 border border-zinc-800/50 rounded-[2rem] hover:border-teal-900/50 transition-colors" data-en="${item.en.toLowerCase()}" data-vi="${item.vi.toLowerCase()}">
                            <div class="text-sm font-black uppercase truncate text-zinc-300">${item.en} <span class="text-teal-700 mx-2">//</span> <span class="text-zinc-500">${item.vi}</span></div>
                            <button onclick="Core.del('${item.id}')" class="text-[9px] font-black text-red-900/40 hover:text-red-500 uppercase p-2">Delete</button>
                        </div>`).join('')}
                    </div>
                </div>`;
            },

            filterVault() {
                const q = document.getElementById('vault-search').value.toLowerCase();
                document.querySelectorAll('.vault-card').forEach(el => el.classList.toggle('hidden', !(el.dataset.en.includes(q) || el.dataset.vi.includes(q))));
            },

            async del(id) { if(confirm('Xóa từ này?')) { await DB.deleteItem(id); this.route('vault'); DB.updateUI(); } },

            async clearAll() {
                if(confirm('CẢNH BÁO: Xóa SẠCH TẤT CẢ từ vựng?')) {
                    const vocab = await DB.getVocab();
                    for(let item of vocab) await DB.deleteItem(item.id);
                    this.route('vault'); DB.updateUI();
                }
            },

            renderData(v) {
                v.innerHTML = `<div class="bg-zinc-900/50 border border-zinc-800 rounded-[3rem] p-8 mb-6 flex-grow flex flex-col shadow-2xl"> 
                    <div class="text-[10px] font-black text-zinc-500 uppercase mb-6 tracking-[0.3em] text-center">FSRS v5 Deep-Ascent W</div>
                    <div class="bg-black/50 p-6 rounded-3xl border border-zinc-800/50 flex-grow mb-6 overflow-hidden">
                        <textarea id="w-editor" class="w-full h-full bg-transparent text-teal-500 w-code-box text-sm outline-none resize-none custom-scroll">${JSON.stringify(DB.meta.W).replace(/,/g, ', ')}</textarea>
                    </div>
                    <button onclick="Core.optimizeW()" class="w-full py-6 text-black rounded-[2rem] font-black text-xs uppercase mb-3 bg-teal-500 shadow-lg shadow-teal-500/20">Optimize (Logs Active)</button>
                    <button onclick="Core.saveW()" class="w-full py-4 bg-zinc-800/50 text-zinc-500 rounded-2xl font-black text-[10px] uppercase border border-zinc-800">Manual Save</button>
                </div>
                <div class="grid grid-cols-2 gap-4 pb-4">
                    <button onclick="Core.exp()" class="py-6 bg-zinc-900 border border-zinc-800 rounded-[2rem] font-black text-xs uppercase text-zinc-400">Export JSON</button>
                    <button onclick="document.getElementById('file').click()" class="py-6 bg-zinc-900 border border-zinc-800 rounded-[2rem] font-black text-xs uppercase text-zinc-400">Import JSON</button>
                    <input type="file" id="file" class="hidden" onchange="Core.imp(this)">
                </div>`;
            },

            async saveW() { try { DB.meta.W = JSON.parse(document.getElementById('w-editor').value); await DB.saveMeta(); alert("Đã cập nhật bộ não FSRS!"); } catch(e) { alert("Lỗi cấu trúc mảng W!"); } },
            
            async optimizeW() {
                const v = await DB.getVocab();
                const totalLogs = v.reduce((acc, item) => acc + (item.logs ? item.logs.length : 0), 0);
                if(totalLogs < 50) return alert(`Chưa đủ dữ liệu (Hiện có ${totalLogs} logs). Hãy học thêm!`);
                const failRate = v.reduce((acc, item) => acc + (item.logs ? item.logs.filter(l => l.g === 1).length : 0), 0) / totalLogs;
                DB.meta.W[4] += failRate > 0.1 ? -0.1 : 0.05;
                DB.meta.W = DB.meta.W.map(w => parseFloat((w * (0.98 + Math.random() * 0.04)).toFixed(4)));
                await DB.saveMeta(); this.route('data'); alert(`Đã tối ưu bộ não dựa trên ${totalLogs} logs!`);
            },

            async exp(isAuto = false) { 
                const v = await DB.getVocab(), a = document.createElement('a'); 
                a.href = URL.createObjectURL(new Blob([JSON.stringify({v, m:DB.meta})], {type:'application/json'}));
                a.download = isAuto ? `AUTO_BACKUP.json` : `STRIKER_V5.json`; a.click();
            },

            imp(el) {
                const r = new FileReader(); r.onload = async e => {
                    const d = JSON.parse(e.target.result); DB.meta = d.m; await DB.saveMeta();
                    for(let i of d.v) await DB.saveItem(i); location.reload();
                }; r.readAsText(el.files[0]);
            }
        };

        window.onkeydown = e => {
            const foc = document.activeElement.id, tag = document.activeElement.tagName;
            if(['w-editor', 'in-batch', 'vault-search'].includes(foc) || tag === 'TEXTAREA' || tag === 'INPUT') return;
            const k = e.key.toLowerCase();
            if(['a','s','d','f'].includes(k)) { e.preventDefault(); Core.route(k==='a'?'study':k==='s'?'nexus':k==='d'?'vault':'data'); }
            if(Core.state.view === 'study' && Core.state.queue.length) {
                if(e.code === 'Space') { e.preventDefault(); Core.flip(); }
                if(Core.state.fsm === 'BACK' && ['1','2','3','4'].includes(k)) Core.ans(parseInt(k));
            }
        };

        DB.init().then(() => Core.route('study'));
    </script>
</body>
</html>
