    <script>
        // Chỗ thay số 1: Nâng cấp danh sách tham số lên 21 (FSRS v5)
const DEFAULT_W = [
    0.4025, 1.1838, 3.173, 15.691,  // W0-W3: Độ ổn định ban đầu
    7.1949, 0.5345,                  // W4-W5: Độ khó ban đầu
    1.4604, 0.0046,                  // W6-W7: Độ khó "trôi dạt" (Drift)
    1.5457, 0.1192, 1.0192,          // W8-W10: Tăng trưởng độ ổn định
    1.9395, 0.11, 0.296, 2.2698,     // W11-W14: Khi bạn quên bài (Again)
    0.2315, 2.9898,                  // W15-W16: Thưởng/Phạt (Hard/Easy)
    0.5165, 0.6621, 0.338, 0.06      // W17-W20: [MỚI] Tối ưu ngắn hạn & phục hồi
];
        
        const generateID = () => {
    try { return crypto.randomUUID(); } 
    catch(e) { return Date.now().toString(36) + Math.random().toString(36).substring(2); }
};

const DB = {
    idb: null,
    meta: { streak: 0, lastDate: null, desired_retention: 0.9, W: [...DEFAULT_W], totalRev: 0, successRev: 0, sessionReviews: 0 },
    writeBuffer: new Map(),
    
    async init() {
        return new Promise(res => {
            const req = indexedDB.open("KP_STRIKER_V5_CORE", 1);
            req.onupgradeneeded = e => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains("vocab")) db.createObjectStore("vocab", { keyPath: "id" });
                if (!db.objectStoreNames.contains("meta")) db.createObjectStore("meta");
            };
            req.onsuccess = async e => {
                this.idb = e.target.result;
                const saved = await this.getMeta();
                if (saved) this.meta = { ...this.meta, ...saved };
                res();
            };
        });
    },

    async flush() {
        if (this.writeBuffer.size === 0) return;
        return new Promise((res) => {
            const tx = this.idb.transaction("vocab", "readwrite");
            const store = tx.objectStore("vocab");
            for (let item of this.writeBuffer.values()) store.put(item);
            this.writeBuffer.clear();
            tx.oncomplete = () => res();
        });
    },

    async getVocab() { 
        await this.flush(); 
        return new Promise(r => {
            const tx = this.idb.transaction("vocab", "readonly");
            tx.objectStore("vocab").getAll().onsuccess = e => r(e.target.result || []);
        });
    },

    async saveItem(item) { 
        // CHỐT CHẶN: Ép dữ liệu về số thực, tránh lỗi NaN gây hỏng database
        item.s = Math.max(0.1, isFinite(item.s) ? item.s : 0.1);
        item.d = Math.min(Math.max(isFinite(item.d) ? item.d : 5, 1), 10);
        item.next = isFinite(item.next) ? item.next : Date.now();
        
        this.writeBuffer.set(item.id, item); 
        if (this.writeBuffer.size >= 1) await this.flush(); 
    },

    async saveMeta() { 
        const tx = this.idb.transaction("meta", "readwrite");
        tx.objectStore("meta").put(this.meta, "main");
        this.updateUI();
    },

    async getMeta() { 
        return new Promise(r => {
            const tx = this.idb.transaction("meta", "readonly");
            tx.objectStore("meta").get("main").onsuccess = e => r(e.target.result);
        });
    },

    async deleteItem(id) { 
        this.writeBuffer.delete(id); 
        const tx = this.idb.transaction("vocab", "readwrite");
        tx.objectStore("vocab").delete(id); 
    },

    updateUI() {
        const streakEl = document.getElementById('streak');
        const targetEl = document.getElementById('target-count');
        if (streakEl) streakEl.innerText = this.meta.streak;
        this.getVocab().then(v => {
            if (targetEl) targetEl.innerText = v.filter(i => i.next <= Date.now()).length;
        });
    }
};

        window.addEventListener('beforeunload', () => DB.flush());
// ==========================================
// BƯỚC 1: KẾT NỐI BỘ NÃO GEMINI AI
// ==========================================
// Lấy key từ máy người dùng, nếu không có thì để trống
let GEMINI_API_KEY = localStorage.getItem('user_api_key') || "";

async function askAI(prompt) {
    const currentKey = localStorage.getItem('user_api_key') || "";
    if (!currentKey) return "Ông chưa nhập API Key của Groq vào tab Data kìa!";

    // Link API của Groq - Chuẩn OpenAI tương thích
    const url = "https://api.groq.com/openai/v1/chat/completions";

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${currentKey}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                // Dùng model Llama 3.3 Versatile - Con hàng mạnh nhất & miễn phí hiện nay
                model: "llama-3.3-70b-versatile", 
                messages: [
                    { "role": "system", "content": "Bạn là một trợ lý học tiếng Anh thông minh. Hãy giải thích ngắn gọn, dễ hiểu." },
                    { "role": "user", "content": prompt }
                ],
                temperature: 0.7
            })
        });

        const data = await response.json();

        if (!response.ok) {
            return `Lỗi Groq: ${data.error.message}`;
        }

        return data.choices[0].message.content;
    } catch (e) {
        return "Kết nối mạng có vấn đề, nhưng chắc chắn không phải lỗi vùng miền đâu!";
    }
}
        const Core = {
            state: { view: '', queue: [], initialQueueSize: 0, fsm: 'IDLE', isOptimizing: false, vaultData: [] },
            
            async route(v) {
    console.log("Đang chuyển sang tab:", v); // Dòng này để kiểm tra lỗi
    try {
        await DB.flush();
        this.state.view = v;

        // Cập nhật giao diện nút bấm
        document.querySelectorAll('nav button').forEach(b => {
            b.classList.toggle('tab-active', b.id === 'n-' + v);
        });

        const port = document.getElementById('view'); 
        if (!port) return; 
        port.innerHTML = ''; // Xóa màn hình cũ
        
        // Logic hiển thị từng màn hình
        if (v === 'study') {
            const v_list = await DB.getVocab();
            this.state.queue = v_list.filter(i => i.next <= Date.now()).sort((a, b) => a.next - b.next);
            this.state.initialQueueSize = this.state.queue.length;
            this.renderStudyFrame(port); 
            this.nextCard();
        } else if (v === 'nexus') {
            this.renderNexus(port);
        } else if (v === 'forecast') {
            const v_list = await DB.getVocab();
            this.state.vaultData = v_list;
            this.renderForecast(port);
        } else if (v === 'vault') {
            this.renderVault(port);
        } else if (v === 'data') {
            this.renderData(port);
        }
    } catch (e) {
        console.error("LỖI ĐIỀU HƯỚNG:", e);
        alert("App bị lỗi logic, nhấn F12 để xem chi tiết");
    }
},

            renderStudyFrame(v) {
    v.innerHTML = `<div id="study-container" class="h-full flex flex-col justify-between">
        <div class="cursor-pointer flex-grow flex flex-col" onclick="Core.flip()">
            <div id="cf" class="card-side p-8 text-center flex-grow"><h2 id="en-disp" class="text-4xl font-black uppercase tracking-tighter text-white break-all"></h2></div>
            <div id="cb" class="card-side p-8 text-center flex-grow hidden relative">
                <h2 id="vi-disp" class="text-3xl font-black text-teal-400 break-words"></h2>
                <button onclick="event.stopPropagation(); Core.getAIHelp()" class="mt-4 px-4 py-2 bg-teal-900/30 border border-teal-500/50 rounded-full text-[10px] font-black text-teal-500 uppercase tracking-widest active:scale-95 transition-all">✨ AI Help</button>
                <div id="ai-reasoning" class="mt-4 text-[12px] text-zinc-400 italic font-medium max-w-[80%] leading-relaxed hidden"></div>
            </div>
        </div>
        <div id="ctrl" class="grid grid-cols-4 gap-3 mt-6 opacity-0 pointer-events-none transition-all">
            ${[1,2,3,4].map(g => `<button onclick="Core.ans(${g})" class="bg-zinc-900 border border-zinc-800 py-8 rounded-[2rem] text-[10px] font-black uppercase text-zinc-400">${['Again','Hard','Good','Easy'][g-1]}</button>`).join('')}
        </div>
    </div><div id="empty-msg" class="hidden card-side border-2 border-dashed border-zinc-800 text-sm font-black text-zinc-600 uppercase tracking-[0.2em]">All Clear</div>`;
},

            async nextCard() {
                if(!this.state.queue.length) {
                    const sc = document.getElementById('study-container'); if(sc) sc.classList.add('hidden');
                    const em = document.getElementById('empty-msg'); if(em) em.classList.remove('hidden');
                    document.getElementById('progress').style.width = '100%';
                    return;
                }
                const qItem = this.state.queue[0]; const item = qItem.ref || qItem;
                this.state.fsm = 'FRONT';
                document.getElementById('en-disp').innerText = item.en; document.getElementById('vi-disp').innerText = item.vi;
                document.getElementById('cf').classList.remove('hidden'); document.getElementById('cb').classList.add('hidden');
                document.getElementById('ctrl').classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('progress').style.width = `${((this.state.initialQueueSize - this.state.queue.length) / this.state.initialQueueSize) * 100}%`;
            const helpBox = document.getElementById('ai-reasoning');
        if(helpBox) {
            helpBox.classList.add('hidden');
            helpBox.innerText = ""; // Xóa luôn nội dung cũ cho sạch
        }},

            flip() { if(this.state.fsm === 'FRONT') { this.state.fsm = 'BACK'; document.getElementById('cf').classList.add('hidden'); document.getElementById('cb').classList.remove('hidden'); document.getElementById('ctrl').classList.remove('opacity-0', 'pointer-events-none'); } },async getAIHelp() {
    const item = this.state.queue[0].ref || this.state.queue[0];
    const helpBox = document.getElementById('ai-reasoning');
    if (!helpBox) return;

    helpBox.innerText = "AI đang suy nghĩ...";
    helpBox.classList.remove('hidden');

    const prompt = `Giải thích ngắn gọn từ "${item.en}" (nghĩa là ${item.vi}) bằng 1 câu ví dụ hài hước hoặc một mẹo ghi nhớ (mnemonics). Chỉ trả về tối đa 30 từ tiếng Việt.`;
    
    const result = await askAI(prompt);
    if (result) {
        // Lọc bớt các ký tự thừa nếu có
        helpBox.innerText = result.replace(/["*]/g, '');
    } else {
        helpBox.innerText = "Lỗi kết nối AI rồi bạn ơi!";
    }
},

            async ans(g) {
    if(this.state.fsm !== 'BACK') return;
    this.state.fsm = 'TRANSITION';
    const qItem = this.state.queue.shift(); const item = qItem.ref || qItem;
    const t = item.lastReview ? (Date.now() - item.lastReview) / 86400000 : 0;
    
    // CHỈ LƯU LOG KHI: Thẻ không phải là 'Debt' (học lại trong phiên) 
    // và khoảng cách t > 0.1 ngày (tránh spam phím)
    if(!qItem.isDebt) {
        if(!item.logs) item.logs = [];
        item.logs.push({ g, t: parseFloat(t.toFixed(4)) });
        if (item.logs.length > 500) item.logs.shift(); // Giữ 500 log gần nhất để học
        
        DB.meta.totalRev++;
        if(g >= 2) DB.meta.successRev++;
        this.updateStreak();
    }

    this.calculate(item, g, t);
    await DB.saveItem(item);
    
    if(g === 1) {
        this.state.queue.splice(Math.min(10, this.state.queue.length), 0, { ...item, isDebt: true, ref: item });
    }
    
    // Nếu hết bài, tự động chạy Optimizer để tiến hóa
    if(this.state.queue.length === 0) this.optimizeW();
    
    await DB.saveMeta(); this.nextCard();
},

            calculate(item, g, t) {
    const w = DB.meta.W;
    const ret = DB.meta.desired_retention;
    let { s, d, reps } = item;
    
    // Tính khả năng nhớ hiện tại (R) - Quy luật lũy thừa (Power Law)
    const r = reps > 0 ? Math.pow(1 + t / (9 * s), -1) : 1;

    if (reps === 0) {
        // Khởi tạo S theo 4 mức độ phản hồi (W0-W3)
        s = w[g - 1];
        d = Math.min(Math.max(w[4] - (g - 3) * w[5], 1), 10);
    } else {
        // Cập nhật Difficulty (D) - Mean Reversion (hướng về W4)
        d = d - w[6] * (g - 3);
        d = w[4] * (1 - w[7]) + d * w[7]; // Giữ D không bị lệch quá xa mức trung bình
        d = Math.min(Math.max(d, 1), 10);

        if (g === 1) { 
            // Khi quên (Again): S suy giảm theo công thức Failure
            s = w[11] * Math.pow(d, -w[12]) * (Math.pow(s + 1, w[13]) - 1) * Math.exp(w[14] * (1 - r));
        } else {
            // Khi nhớ: S tăng trưởng theo công thức Success
            const h = (g === 2) ? w[15] : 1;
            const e = (g === 4) ? w[16] : 1;
            s = s * (1 + Math.exp(w[8]) * (11 - d) * Math.pow(s, -w[9]) * (Math.exp(w[10] * (1 - r)) - 1) * h * e);
        }
    }

    // Chốt chặn NaN, Infinity và giới hạn s không vượt quá 100 năm (36500 ngày) để chống tràn bộ nhớ
s = (isFinite(s) && !isNaN(s)) ? Math.min(Math.max(s, 0.1), 36500) : 0.1;
    const ivl = s * 9 * (1 / ret - 1); // Khoảng cách ngày học tiếp theo

    Object.assign(item, {
        s, d, reps: reps + 1,
        lastReview: Date.now(),
        next: Date.now() + (Math.max(0.01, ivl) * 86400000)
    });
},

            updateStreak() {
                const now = new Date(), today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                const last = DB.meta.lastDate ? new Date(DB.meta.lastDate).getTime() : 0;
                if ((today - last) / 86400000 === 1) { DB.meta.streak++; DB.meta.lastDate = now.toDateString(); } 
                else if ((today - last) / 86400000 > 1 || !DB.meta.lastDate) { DB.meta.streak = 1; DB.meta.lastDate = now.toDateString(); }
            },

            async optimizeW() {
    if (this.state.isOptimizing) return;
    const vocab = await DB.getVocab();
    const cardsWithLogs = vocab.filter(v => v.logs && v.logs.length >= 3);
    
    // Thêm thông báo ở đây
    if(cardsWithLogs.length < 10) {
        alert("Cần tối thiểu 10 thẻ có lịch sử học (3 lần review/thẻ) để AI có đủ dữ liệu rèn luyện!");
        return;
    }

    this.state.isOptimizing = true;
    const status = document.getElementById('sync-status');
    if (status) { status.innerText = "AI EVOLVING..."; status.classList.add('syncing'); }

    const workerCode = `
        self.onmessage = function(e) {
            const { w, cardLogs, epochs } = e.data;
            let curW = [...w];
            let m = new Array(21).fill(0), v = new Array(21).fill(0);
            const alpha = 0.01, beta1 = 0.9, beta2 = 0.999, eps = 1e-8;

            function getLoss(testW) {
                let logLoss = 0, count = 0;
                cardLogs.forEach(card => {
                    let s = 0, d = 0, reps = 0;
                    card.logs.forEach(log => {
                        const { g, t } = log;
                        if (reps > 0) {
                            const r = Math.pow(1 + t / (9 * s), -1);
                            const p = Math.min(Math.max(r, 0.001), 0.999);
                            logLoss += -( (g === 1 ? 0 : 1) * Math.log(p) + (g === 1 ? 1 : 0) * Math.log(1 - p) );
                            d = Math.min(Math.max(d - testW[6]*(g-3), 1), 10);
                            d = testW[4]*(1-testW[7]) + d*testW[7];
                            if(g===1) s = testW[11]*Math.pow(d,-testW[12])*(Math.pow(s+1,testW[13])-1)*Math.exp(testW[14]*(1-r));
                            else s = s*(1+Math.exp(testW[8])*(11-d)*Math.pow(s,-testW[9])*(Math.exp(testW[10]*(1-r))-1)*(g==2?testW[15]:1)*(g==4?testW[16]:1));
                        } else { s = testW[g-1]; d = testW[4] - (g-3)*testW[5]; }
                        reps++; count++;
                    });
                });
                return logLoss / count;
            }

            for (let e = 1; e <= epochs; e++) {
                const baseLoss = getLoss(curW);
                for (let j = 0; j < 21; j++) {
                    let tw = [...curW]; tw[j] += 1e-5;
                    let grad = (getLoss(tw) - baseLoss) / 1e-5;
                    m[j] = beta1 * m[j] + (1 - beta1) * grad;
                    v[j] = beta2 * v[j] + (1 - beta2) * grad * grad;
                    let m_hat = m[j] / (1 - Math.pow(beta1, e));
                    let v_hat = v[j] / (1 - Math.pow(beta2, e));
                    curW[j] -= alpha * m_hat / (Math.sqrt(v_hat) + eps);
                }
            }
            self.postMessage({ w: curW });
        };
    `;

    const blob = new Blob([workerCode], {type: 'application/javascript'});
    const worker = new Worker(URL.createObjectURL(blob));
    worker.onmessage = async (e) => {
        DB.meta.W = e.data.w;
        await DB.saveMeta();
        this.state.isOptimizing = false;
        if (status) { status.innerText = "AI READY"; status.classList.remove('syncing'); }
        worker.terminate();
    };
    worker.postMessage({ w: DB.meta.W, cardLogs: cardsWithLogs, epochs: 40 });
},

            renderNexus(p) { p.innerHTML = `<div class="h-full flex flex-col gap-6"><div class="flex-grow flex flex-col bg-zinc-900/50 border border-zinc-800 rounded-[3rem] p-8 shadow-inner"><textarea id="in-batch" placeholder="word:meaning" class="flex-grow w-full bg-transparent text-teal-400 outline-none font-bold text-2xl resize-none placeholder:text-zinc-800"></textarea></div><button onclick="Core.batch()" class="bg-teal-500 text-black py-8 rounded-[2rem] font-black uppercase text-sm">Import</button></div>`; },
            
            async batch() { 
    const inputEl = document.getElementById('in-batch');
    const raw = inputEl.value.trim(); 
    if(!raw) return; 

    const btn = event.target;
    const originalText = btn.innerText;
    btn.innerText = "AI ĐANG NẠP THẺ...";
    btn.disabled = true;

    try {
        // KIỂM TRA NẾU LÀ DỮ LIỆU JSON TỪ AI
        if (raw.startsWith('[') || raw.startsWith('{')) {
            const data = JSON.parse(raw);
            const list = Array.isArray(data) ? data : [data];
            for (let item of list) {
                await DB.saveItem({ 
                    id: generateID(), 
                    en: item.en, vi: item.vi, 
                    next: Date.now(), 
                    reps: 0, 
                    s: 0.4, 
                    d: item.d || 5, // AI gán độ khó d ở đây
                    lastReview: 0, logs: [] 
                }); 
            }
        } // Tìm trong hàm batch(), phần else của việc nạp thẻ thủ công
else {
    const lines = raw.split('\n').map(l => l.trim()).filter(l => l.includes(':'));
    for(let l of lines) { 
        const parts = l.split(':');
        const en = parts[0].trim();
        const vi = parts.slice(1).join(':').trim();
        if(en && vi) {
            await DB.saveItem({ 
                id: generateID(), en, vi, 
                next: Date.now(), reps: 0, 
                s: 0.4, // Thay 0 bằng 0.4 để đồng nhất với định dạng AI
                d: 5, 
                lastReview: 0, logs: [] 
            }); 
        }
    } 
}
        await DB.flush(); 
        inputEl.value = '';
        await DB.flush(); 
        inputEl.value = '';
        
        // CHI TIẾT QUAN TRỌNG: Ép app khởi động lại logic học ngay lập tức
        await Core.route('study'); 
        
        DB.updateUI(); 
        DB.updateUI();
    } catch(e) {
        alert("Lỗi: Dữ liệu AI không đúng định dạng!");
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
},

            async renderVault(v) { 
                this.state.vaultData = await DB.getVocab();
                v.innerHTML = `<div class="flex flex-col h-full gap-4"><input id="vault-search" oninput="Core.filterVault()" placeholder="SEARCH..." class="p-6 bg-zinc-900 border border-zinc-800 text-teal-500 rounded-3xl outline-none font-black text-xs uppercase"><div id="vault-list" class="flex-grow overflow-y-auto custom-scroll flex flex-col gap-3 pb-6"></div></div>`; 
                this.filterVault();
            },

            filterVault() {
                const list = document.getElementById('vault-list'); if(!list) return;
                const q = (document.getElementById('vault-search')?.value || '').toLowerCase();
                list.innerHTML = this.state.vaultData.filter(i => i.en.toLowerCase().includes(q) || i.vi.toLowerCase().includes(q)).reverse().slice(0,50).map(item => `
                    <div class="flex justify-between items-center p-6 bg-zinc-900/30 border border-zinc-800/50 rounded-[2rem]">
                        <div class="text-sm font-black uppercase truncate text-zinc-300">${item.en} <span class="text-teal-900">//</span> ${item.vi}</div>
                        <button onclick="Core.del('${item.id}')" class="text-[9px] font-black text-red-900/40 uppercase p-2">Del</button>
                    </div>`).join('');
            },

            async del(id) { await DB.deleteItem(id); await DB.flush(); this.route('vault'); DB.updateUI(); },

            async renderData(v) {
    v.innerHTML = `
        <div class="bg-zinc-900/50 border border-teal-500/30 rounded-[3rem] p-8 mb-6">
            <div class="text-[10px] font-black uppercase text-teal-500 mb-4 tracking-widest">Gemini API Configuration</div>
            <input type="password" id="key-input" placeholder="Dán API Key vào đây..." 
                value="${GEMINI_API_KEY}"
                class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-teal-400 font-mono text-sm outline-none mb-4">
            <button onclick="Core.saveKey()" class="w-full py-3 bg-teal-500 text-black rounded-xl font-black text-[10px] uppercase">Lưu Key AI</button>
        </div>

        <div class="bg-zinc-900/50 border border-zinc-800 rounded-[3rem] p-8 mb-6">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-black uppercase text-zinc-500">Desired Retention</span>
                <span id="ret-val" class="text-xl font-black text-teal-500">${(DB.meta.desired_retention * 100).toFixed(0)}%</span>
            </div>
            <input type="range" min="0.7" max="0.97" step="0.01" value="${DB.meta.desired_retention}" 
                oninput="Core.updateRetention(this.value)" class="w-full h-2 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
        </div>
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-[2rem] text-center">
                <div class="text-[9px] font-black text-zinc-500 mb-1 uppercase">Actual Retention</div>
                <div class="text-2xl font-black text-teal-500">${DB.meta.totalRev ? (DB.meta.successRev / DB.meta.totalRev * 100).toFixed(1) : 0}%</div>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-[2rem] text-center">
                <div class="text-[9px] font-black text-zinc-500 mb-1 uppercase">Total Reviews</div>
                <div class="text-2xl font-black text-zinc-400">${DB.meta.totalRev}</div>
            </div>
        </div>
        <button onclick="Core.optimizeW()" class="w-full mb-4 py-5 bg-teal-900/20 border border-teal-800 rounded-[2rem] font-black text-xs uppercase text-teal-500 active:bg-teal-500 active:text-black transition-all tracking-widest">Force Train AI</button>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="Core.exp()" class="py-6 bg-zinc-900 border border-zinc-800 rounded-[2rem] font-black text-xs uppercase text-zinc-400">Export</button>
            <button onclick="document.getElementById('file').click()" class="py-6 bg-zinc-900 border border-zinc-800 rounded-[2rem] font-black text-xs uppercase text-zinc-400">Import</button>
        </div><input type="file" id="file" class="hidden" onchange="Core.imp(this)">
    `;
},
            saveKey() {
    const val = document.getElementById('key-input').value.trim();
    if (!val) {
        alert("Vui lòng nhập Key!");
        return;
    }
    localStorage.setItem('user_api_key', val);
    // Cập nhật ngay lập tức vào biến toàn cục (nếu có dùng)
    window.GEMINI_API_KEY = val; 
    alert("Đã cập nhật bộ não AI thành công! Hệ thống sẽ tự làm mới.");
    location.reload(); // Cách chắc chắn nhất để mọi hàm nhận key mới
},
            updateRetention(v) {
                DB.meta.desired_retention = parseFloat(v);
                document.getElementById('ret-val').innerText = (v * 100).toFixed(0) + '%';
                DB.saveMeta();
            },
            async exp() { const v = await DB.getVocab(); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify({v, m:DB.meta})], {type:'application/json'})); a.download = `STRIKER_DATA.json`; a.click(); },
            imp(el) { const r = new FileReader(); r.onload = async e => { const d = JSON.parse(e.target.result); DB.meta = d.m; await DB.saveMeta(); for(let i of d.v) await DB.saveItem(i); await DB.flush(); location.reload(); }; r.readAsText(el.files[0]); },getForecastData(days) {
                const vocab = this.state.vaultData || [];
                const targetR = DB.meta.desired_retention;
                const now = Date.now();
                let totalR = 0, learned = 0, dailyDue = Array(parseInt(days) || 7).fill(0);
                vocab.forEach(item => {
    if (!item.s || item.reps === 0) return;
    learned++;
    
    // Tính toán khả năng nhớ được sau 'days' ngày (để hiện con số % to tướng)
    const tEnd = (now + (days * 86400000) - (item.lastReview || now)) / 86400000;
    totalR += Math.pow(1 + tEnd / (9 * item.s), -1);

    // Tính ngày đến hạn (Due Date)
    const tDue = 9 * item.s * (1 / DB.meta.desired_retention - 1);
    const dueDate = (item.lastReview || now) + (tDue * 86400000);
    
    // Tính khoảng cách từ hôm nay đến ngày đó
    // Dùng Math.ceil để tránh việc thẻ đến hạn vào chiều nay bị tính là ngày -1
    const diff = Math.floor((dueDate - now) / 86400000);

    // CHỐT CHẶN LỖI SỐ ÂM:
    if (diff < 0) {
        dailyDue[0]++; // Nếu quá hạn (số âm), gom hết vào cột "Hôm nay" (cột đầu tiên)
    } else if (diff < days) {
        dailyDue[diff]++; // Nếu trong tương lai, xếp vào đúng cột của ngày đó
    }
});
                return { avgR: learned ? (totalR / learned * 100).toFixed(1) : 100, dailyDue };
            },

            renderForecast(p) {
                const d = parseInt(localStorage.getItem('fc_days') || '15');
                const data = this.getForecastData(d);
                const max = Math.max(...data.dailyDue, 1);
                p.innerHTML = `<div class="flex flex-col gap-5"><div class="bg-zinc-900 border border-zinc-800 rounded-[2.5rem] p-8 text-center"><p class="text-[10px] font-black uppercase text-zinc-500 tracking-widest mb-2">Trí nhớ sau ${d} ngày</p><h2 class="text-6xl font-black text-teal-500">${data.avgR}%</h2></div><div class="bg-zinc-900 p-4 rounded-3xl border border-zinc-800 flex gap-3"><input id="days-in" type="number" value="${d}" class="w-16 bg-black border border-zinc-800 text-teal-500 font-black text-center rounded-xl outline-none"><button onclick="localStorage.setItem('fc_days', document.getElementById('days-in').value); Core.route('forecast')" class="ml-auto bg-teal-500 text-black px-6 py-2 rounded-xl font-black text-[10px] uppercase">Dự báo</button></div><div class="bg-zinc-900/30 border border-zinc-800/50 rounded-[2.5rem] p-6"><p class="text-[10px] font-black uppercase text-zinc-500 mb-4 text-center tracking-widest">Thẻ đến hạn</p><div class="flex items-end gap-1 h-32">${data.dailyDue.map(c => `<div class="bg-teal-500/20 border-t-2 border-teal-500 w-full" style="height:${(c/max*100)+2}%"></div>`).join('')}</div><div class="flex justify-between mt-3 text-[9px] font-black text-zinc-700 uppercase"><span>Hôm nay</span><span>Ngày ${d}</span></div></div></div>`;
            }
        };

        window.onkeydown = e => {
            const k = e.key.toLowerCase();
            const foc = document.activeElement.tagName; if(foc === 'TEXTAREA' || foc === 'INPUT') return;
            if(Core.state.view === 'study' && Core.state.queue.length) {
                if(e.code === 'Space') { e.preventDefault(); Core.flip(); }
                if(Core.state.fsm === 'BACK' && ['1','2','3','4'].includes(k)) Core.ans(parseInt(k));
            }
        };

        // Thay thế đoạn DB.init cũ bằng đoạn này để ép cập nhật 21 tham số
DB.init().then(async () => {
    // 1. Kiểm tra nếu bộ tham số W bị thiếu (không đủ 21 số của V5)
    if (!DB.meta.W || DB.meta.W.length !== 21) {
        console.log("Phát hiện bộ nhớ cũ (thiếu tham số), đang nâng cấp lên 21 chỉ số...");
        DB.meta.W = [...DEFAULT_W]; // Lấy bộ 21 số mặc định bạn khai báo ở trên
        await DB.saveMeta(); // Lưu đè vào máy ngay lập tức
    }

    // 2. Kiểm tra nếu các biến thống kê bị thiếu thì bổ sung luôn để tránh lỗi tính toán
    if (DB.meta.sessionReviews === undefined) DB.meta.sessionReviews = 0;
    if (DB.meta.totalRev === undefined) DB.meta.totalRev = 0;
    if (DB.meta.successRev === undefined) DB.meta.successRev = 0;

    // 3. Sau khi dọn dẹp bộ nhớ xong mới cho phép vào học
    Core.route('study');
});
