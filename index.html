<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KP v-PRO | THE FINAL GATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, sans-serif; background: #f8fafc; color: #0f172a; }
        .tab-active { background: #1e293b !important; color: white !important; border-color: #1e293b !important; }
        .card-side { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 320px; background: white; border: 2px solid #e2e8f0; border-radius: 16px; width: 100%; }
        .heat-map { display: grid; grid-template-columns: repeat(21, 1fr); gap: 2px; }
        .heat-cell { height: 8px; border-radius: 1px; background: #e2e8f0; transition: background 0.3s; }
        * { transition: none !important; } 
        .hidden { display: none !important; }
        .custom-scroll::-webkit-scrollbar { display: none; }
        @keyframes pulse-gold { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .rank-legend { background: #f59e0b; color: white; animation: pulse-gold 2s infinite; }
    </style>
</head>
<body class="flex justify-center p-2 sm:p-4">

    <div class="w-full max-w-lg flex flex-col h-[98dvh]">
        <header class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm flex justify-between items-center mb-2">
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <span class="font-black text-orange-500 text-lg">🔥 <span id="streak">0</span></span>
                    <span id="rank-tag" class="text-[9px] font-black px-2 py-0.5 rounded-full uppercase tracking-tighter shadow-sm bg-slate-100 text-slate-500">NEWBIE</span>
                </div>
                <div id="mastery" class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-widest">MASTERED: 0%</div>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="Core.toggleRain()" id="rain-btn" class="text-slate-300 hover:text-indigo-400 transition-colors text-lg">🌧️</button>
                <div id="heatmap" class="heat-map w-24"></div>
            </div>

            <div class="text-[10px] font-mono text-slate-400 font-bold text-right leading-tight" id="stats-total">
                0 UNITS
            </div>
        </header>

        <main id="view" class="flex-grow overflow-hidden relative"></main>

        <nav class="mt-2 grid grid-cols-4 gap-1.5">
            <button onclick="Core.route('study')" id="n-study" class="bg-white border border-slate-200 py-3.5 rounded-xl font-bold text-slate-500 text-xs uppercase tracking-tight">Study [S]</button>
            <button onclick="Core.route('nexus')" id="n-nexus" class="bg-white border border-slate-200 py-3.5 rounded-xl font-bold text-slate-500 text-xs uppercase tracking-tight">Nexus [N]</button>
            <button onclick="Core.route('vault')" id="n-vault" class="bg-white border border-slate-200 py-3.5 rounded-xl font-bold text-slate-500 text-xs uppercase tracking-tight">Vault [V]</button>
            <button onclick="Core.route('data')" id="n-data" class="bg-white border border-slate-200 py-3.5 rounded-xl font-bold text-slate-400 text-[10px] uppercase">Data</button>
        </nav>
    </div>

    <audio id="rain-audio" loop>
        <source src="https://actions.google.com/sounds/v1/water/rain_on_roof.ogg" type="audio/mpeg">
    </audio>

    <script>
        const DB = {
            vocab: JSON.parse(localStorage.getItem('KP_PRO_VOCAB')) || [],
            meta: JSON.parse(localStorage.getItem('KP_PRO_META')) || { streak: 0, lastDate: null, history: {}, speechRate: 0.9 },
            save() {
                localStorage.setItem('KP_PRO_VOCAB', JSON.stringify(this.vocab));
                localStorage.setItem('KP_PRO_META', JSON.stringify(this.meta));
                this.updateUI();
            },
            updateUI() {
                document.getElementById('streak').innerText = this.meta.streak;
                document.getElementById('stats-total').innerText = this.vocab.length + " UNITS";
                const mastered = this.vocab.filter(i => i.ef > 3.2).length;
                document.getElementById('mastery').innerText = `MASTERED: ${this.vocab.length ? Math.round(mastered/this.vocab.length*100) : 0}%`;
                this.renderHeatmap();
            },
            renderHeatmap() {
                const h = document.getElementById('heatmap'); h.innerHTML = '';
                const today = new Date();
                for(let i=15; i>=0; i--) {
                    const d = new Date(); d.setDate(today.getDate() - i);
                    const count = this.meta.history[d.toDateString()] || 0;
                    const cell = document.createElement('div');
                    cell.className = 'heat-cell';
                    if(count > 0) cell.style.background = `rgba(79, 70, 229, ${Math.min(0.2 + count * 0.15, 1)})`;
                    h.appendChild(cell);
                }
            }
        };

        const Core = {
            state: { view: '', flipped: false, queue: [], isRainy: false },
            
            speak(txt) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(txt);
                msg.lang = 'en-US';
                msg.rate = DB.meta.speechRate || 0.9;
                window.speechSynthesis.speak(msg);
            },

            toggleRain() {
                const rain = document.getElementById('rain-audio');
                const btn = document.getElementById('rain-btn');
                this.state.isRainy = !this.state.isRainy;
                if(this.state.isRainy) {
                    rain.play();
                    btn.classList.add('text-indigo-500');
                    btn.innerText = '🌧️✨';
                } else {
                    rain.pause();
                    btn.classList.remove('text-indigo-500');
                    btn.innerText = '🌧️';
                }
            },

            getPosTag(vi) {
                const map = { '(n)': 'bg-blue-100 text-blue-600', '(v)': 'bg-green-100 text-green-600', '(adj)': 'bg-orange-100 text-orange-600', '(adv)': 'bg-purple-100 text-purple-600' };
                for (let key in map) {
                    if (vi.toLowerCase().includes(key)) return `<span class="ml-2 px-1.5 py-0.5 rounded text-[8px] font-black uppercase ${map[key]}">${key.replace('(','').replace(')','')}</span>`;
                }
                return '';
            },

            updateRank() {
                const count = DB.vocab.length;
                const tag = document.getElementById('rank-tag');
                let rank = { name: 'NEWBIE', class: 'bg-slate-100 text-slate-500' };
                if (count > 1000) rank = { name: 'LEGEND', class: 'rank-legend' };
                else if (count > 500) rank = { name: 'SCHOLAR', class: 'bg-indigo-600 text-white' };
                else if (count > 100) rank = { name: 'SURVIVOR', class: 'bg-orange-500 text-white' };
                else if (count > 20) rank = { name: 'TRAINEE', class: 'bg-emerald-500 text-white' };
                tag.innerText = rank.name;
                tag.className = `text-[9px] font-black px-2 py-0.5 rounded-full uppercase tracking-tighter shadow-sm ${rank.class}`;
            },

            route(v) {
                this.state.view = v; this.state.flipped = false;
                document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
                const btn = document.getElementById('n-'+v); if(btn) btn.classList.add('tab-active');
                const port = document.getElementById('view'); port.innerHTML = '';
                if (v === 'study') this.renderStudy(port);
                if (v === 'nexus') this.renderNexus(port);
                if (v === 'vault') this.renderVault(port);
                if (v === 'data') this.renderData(port);
                this.updateRank();
                DB.save();
            },

            renderStudy(v) {
                this.state.queue = DB.vocab.filter(i => i.next <= Date.now()).sort((a,b) => a.next - b.next);
                if(this.state.queue.length === 0) {
                    v.innerHTML = `<div class="card-side text-slate-300 font-black border-dashed text-xs uppercase px-12 text-center">Xong rồi! Nghỉ ngơi đi Legend! ☕</div>`;
                    return;
                }
                const item = this.state.queue[0];
                v.innerHTML = `
                    <div id="study-card" class="h-full flex flex-col">
                        <div class="relative cursor-pointer" onclick="Core.flip()">
                            <div id="card-front" class="card-side shadow-sm p-6 text-center">
                                <h2 class="text-5xl font-black mb-3 tracking-tighter uppercase text-slate-800">${item.en}</h2>
                                <p class="text-slate-400 font-mono text-sm tracking-widest">${item.ipa||''}</p>
                            </div>
                            <div id="card-back" class="card-side shadow-sm p-6 text-center hidden border-indigo-200 bg-indigo-50/20">
                                <h2 class="text-3xl font-bold text-indigo-600 tracking-tight">
                                    ${item.vi.replace(/\(n\)|\(v\)|\(adj\)|\(adv\)/gi, '')} 
                                    ${this.getPosTag(item.vi)}
                                </h2>
                            </div>
                        </div>
                        <div id="study-controls" class="grid grid-cols-4 gap-1.5 mt-2 opacity-20 pointer-events-none">
                            <button onclick="Core.ans(0)" class="bg-white border-2 border-slate-100 py-4 font-black text-[10px] rounded-xl hover:bg-rose-50">AGAIN</button>
                            <button onclick="Core.ans(1)" class="bg-white border-2 border-slate-100 py-4 font-black text-[10px] rounded-xl">HARD</button>
                            <button onclick="Core.ans(3)" class="bg-white border-2 border-slate-100 py-4 font-black text-[10px] rounded-xl">GOOD</button>
                            <button onclick="Core.ans(5)" class="bg-indigo-600 text-white py-4 font-black text-[10px] rounded-xl shadow-lg shadow-indigo-100">EASY</button>
                        </div>
                    </div>`;
            },

            flip() {
                if (this.state.view !== 'study' || this.state.queue.length === 0) return;
                this.state.flipped = !this.state.flipped;
                document.getElementById('card-front').classList.toggle('hidden', this.state.flipped);
                document.getElementById('card-back').classList.toggle('hidden', !this.state.flipped);
                const ctrl = document.getElementById('study-controls');
                ctrl.classList.toggle('opacity-20', !this.state.flipped);
                ctrl.classList.toggle('pointer-events-none', !this.state.flipped);
                if(this.state.flipped) this.speak(this.state.queue[0].en);
            },

            ans(q) {
                if(!this.state.flipped) return;
                const item = this.state.queue[0];
                let { reps, ef, interval: i } = item;
                if (q >= 3) {
                    if (reps === 0) i = 1; else if (reps === 1) i = 4; else i = Math.round(i * ef);
                    reps++;
                } else { reps = 0; i = 1; }
                ef = Math.max(1.3, ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
                const delay = (q === 0) ? 600000 : (i * (0.95 + Math.random() * 0.1)) * 86400000;
                Object.assign(item, { reps, ef, interval: i, next: Date.now() + delay });
                
                // Track history
                const today = new Date().toDateString();
                DB.meta.history[today] = (DB.meta.history[today] || 0) + 1;
                
                this.updateStreak(); this.route('study');
            },

            renderNexus(v) {
                v.innerHTML = `
                    <div class="bg-white border border-slate-200 p-6 rounded-2xl flex flex-col gap-4">
                        <input id="in-en" autocomplete="off" placeholder="TỪ TIẾNG ANH..." class="w-full p-4 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500 font-black text-2xl uppercase tracking-tighter">
                        <input id="in-vi" autocomplete="off" placeholder="NGHĨA CỦA TỪ..." class="w-full p-4 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500 font-bold text-indigo-600 text-lg">
                        <div id="nexus-info" class="text-[10px] text-slate-300 font-bold uppercase tracking-widest ml-1 italic">Tự động lấy IPA...</div>
                        <button onclick="Core.add()" class="bg-slate-900 text-white py-4.5 rounded-xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95">LƯU VÀO KHO [ENTER]</button>
                    </div>
                    <div class="mt-2 flex flex-col gap-2">
                        <textarea id="bulk" class="w-full h-32 p-4 outline-none text-xs font-mono bg-white border border-slate-100 rounded-2xl custom-scroll" placeholder="NHẬP NHANH (từ : nghĩa)"></textarea>
                        <button onclick="Core.bulkAdd()" class="w-full py-3 bg-slate-100 text-slate-500 rounded-xl font-black text-[10px] uppercase tracking-[0.2em]">📥 NHẬP DANH SÁCH NHANH</button>
                    </div>`;
                
                const en = document.getElementById('in-en');
                en.focus();
                en.oninput = async () => {
                    const val = en.value.trim();
                    if(val.length > 1) {
                        try {
                            document.getElementById('nexus-info').innerText = 'TRA CỨU...';
                            const [t, i] = await Promise.all([
                                fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${val}`).then(r => r.json()),
                                fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${val}`).then(r => r.json()).catch(() => null)
                            ]);
                            const entry = i?.[0];
                            const viMean = t?.[0]?.[0]?.[0]?.toLowerCase() || '';
                            let posTag = '';
                            if (entry?.meanings?.[0]) {
                                const pos = entry.meanings[0].partOfSpeech.toLowerCase();
                                if (pos.includes('noun')) posTag = ' (n)';
                                else if (pos.includes('verb')) posTag = ' (v)';
                                else if (pos.includes('adj')) posTag = ' (adj)';
                                else if (pos.includes('adv')) posTag = ' (adv)';
                            }
                            document.getElementById('in-vi').value = viMean + posTag;
                            const ipa = entry?.phonetic || entry?.phonetics?.find(p => p.text)?.text || '';
                            window.curInf = { ipa: ipa };
                            document.getElementById('nexus-info').innerText = 'IPA: ' + (ipa || 'N/A');
                        } catch(e) { document.getElementById('nexus-info').innerText = 'IPA: N/A'; }
                    }
                };
            },

            add() {
                const en = document.getElementById('in-en')?.value.trim();
                const vi = document.getElementById('in-vi')?.value.trim();
                if(!en || !vi) return;
                DB.vocab.push({ id: Date.now(), en, vi, ipa: window.curInf?.ipa || '', reps: 0, ef: 2.5, interval: 0, next: Date.now() });
                
                // Track activity in heatmap immediately
                const today = new Date().toDateString();
                DB.meta.history[today] = (DB.meta.history[today] || 0) + 1;
                
                this.speak(en);
                document.getElementById('in-en').value = ''; document.getElementById('in-vi').value = '';
                document.getElementById('in-en').focus(); DB.save(); DB.updateUI(); this.updateRank();
            },

            bulkAdd() {
                const area = document.getElementById('bulk');
                const val = area?.value.trim();
                if(!val) return;
                const lines = val.split('\n');
                let count = 0;
                const today = new Date().toDateString();
                lines.forEach(line => {
                    if (line.includes(':')) {
                        const [en, vi] = line.split(':').map(s => s.trim());
                        if (en && vi) {
                            DB.vocab.push({ id: Date.now() + Math.random(), en, vi, ipa: '', reps: 0, ef: 2.5, interval: 0, next: Date.now() });
                            DB.meta.history[today] = (DB.meta.history[today] || 0) + 1;
                            count++;
                        }
                    }
                });
                if (count > 0) { area.value = ''; DB.save(); DB.updateUI(); this.updateRank(); }
            },

            renderVault(v) {
                v.innerHTML = `<input id="v-search" oninput="Core.search(this.value)" placeholder="TÌM KIẾM TRONG KHO..." class="w-full p-4 mb-2 border-2 border-slate-100 rounded-xl outline-none text-sm font-bold"><div id="v-list" class="overflow-y-auto max-h-[65vh] custom-scroll flex flex-col gap-1.5"></div>`;
                this.search('');
            },

            search(q) {
                const list = document.getElementById('v-list');
                const query = q.toLowerCase();
                list.innerHTML = DB.vocab.filter(i => i.en.toLowerCase().includes(query) || i.vi.includes(query)).slice().reverse().map(i => `
                    <div class="flex justify-between items-center p-4 bg-white border border-slate-50 rounded-xl shadow-sm">
                        <div class="text-sm font-black text-slate-700 uppercase tracking-tighter">${i.en} <span class="text-indigo-400 ml-1 font-bold lowercase">/ ${i.vi}</span> ${this.getPosTag(i.vi)}</div>
                        <button onclick="Core.del(${i.id})" class="text-rose-400 text-[9px] font-black uppercase tracking-widest">XÓA</button>
                    </div>`).join('');
            },

            del(id) {
                const backup = [...DB.vocab];
                const item = DB.vocab.find(i => i.id === id);
                DB.vocab = DB.vocab.filter(i => i.id !== id);
                DB.save(); this.search(document.getElementById('v-search')?.value || '');
                const toast = document.createElement('div');
                toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-[9px] font-black z-50 flex gap-4 shadow-2xl";
                toast.innerHTML = `ĐÃ XÓA: ${item.en.toUpperCase()} <button id="undo-btn" class="text-indigo-400 underline uppercase">Hoàn tác</button>`;
                document.body.appendChild(toast);
                const timer = setTimeout(() => toast.remove(), 3000);
                document.getElementById('undo-btn').onclick = () => { clearTimeout(timer); DB.vocab = backup; DB.save(); this.search(''); toast.remove(); this.updateRank(); };
            },

            renderData(v) {
                v.innerHTML = `
                <div class="bg-white p-8 rounded-2xl flex flex-col gap-6 border border-slate-100">
                    <div class="p-4 bg-slate-50 rounded-xl">
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] block mb-3 text-center">Tốc độ giọng nói: <span id="rate-val" class="text-indigo-600">${DB.meta.speechRate || 0.9}</span>X</label>
                        <input type="range" min="0.3" max="1.5" step="0.1" value="${DB.meta.speechRate || 0.9}" 
                            class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                            oninput="DB.meta.speechRate = parseFloat(this.value); document.getElementById('rate-val').innerText = this.value; DB.save();">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="Core.export()" class="py-4 bg-indigo-50 text-indigo-600 font-black rounded-xl text-[10px] uppercase border border-indigo-100">Xuất file</button>
                        <button onclick="document.getElementById('imp').click()" class="py-4 bg-slate-50 text-slate-600 font-black rounded-xl text-[10px] uppercase border border-slate-100">Nhập file</button>
                    </div>
                    <input type="file" id="imp" onchange="Core.import(this)" class="hidden">
                    <button onclick="if(confirm('Xóa sạch bộ nhớ?')){localStorage.clear();location.reload()}" class="mt-4 text-rose-300 text-[9px] font-black uppercase tracking-widest">Format bộ nhớ</button>
                </div>`;
            },

            updateStreak() {
                const today = new Date().toDateString();
                if(DB.meta.lastDate !== today) {
                    const last = new Date(DB.meta.lastDate);
                    DB.meta.streak = ((new Date() - last) / 86400000 <= 1.5) ? DB.meta.streak + 1 : 1;
                    DB.meta.lastDate = today;
                }
            },

            export() {
                const b = new Blob([JSON.stringify({v: DB.vocab, m: DB.meta})], {type: 'application/json'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'KP_Backup.json'; a.click();
            },

            import(el) {
                const r = new FileReader(); r.onload = (e) => {
                    const d = JSON.parse(e.target.result); DB.vocab = d.v; DB.meta = d.m; DB.save(); location.reload();
                }; r.readAsText(el.files[0]);
            }
        };

        window.onkeydown = (e) => {
            const target = e.target;
            if (['INPUT', 'TEXTAREA'].includes(target.tagName)) {
                if (e.key === 'Enter') {
                    if (target.id === 'in-en') Core.add();
                    if (target.id === 'bulk' && !e.shiftKey) { e.preventDefault(); Core.bulkAdd(); }
                }
                return;
            }
            const key = e.key.toLowerCase();
            if (key === 's') Core.route('study');
            if (key === 'n') Core.route('nexus');
            if (key === 'v') Core.route('vault');
            if (Core.state.view === 'study' && Core.state.queue.length > 0) {
                if (e.code === 'Space' || key === 'f') { e.preventDefault(); Core.flip(); }
                if (Core.state.flipped) {
                    if (key === '1') Core.ans(0); if (key === '2') Core.ans(1);
                    if (key === '3') Core.ans(3); if (key === '4') Core.ans(5);
                }
            }
        };

        Core.route('study');
        DB.updateUI();
    </script>
</body>
</html>
