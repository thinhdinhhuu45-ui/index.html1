<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHAI PHÓNG v∞ - INFINITY EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #fafafa; color: #0d0d0d; }
        .tab-active { background: #6366f1 !important; color: white !important; transform: scale(1.05); }
        .card { perspective: 1500px; height: 420px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1); transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 40px; border: 1px solid rgba(0,0,0,0.03); background: white; padding: 40px; box-shadow: 0 15px 35px -10px rgba(0,0,0,0.08); transition: box-shadow 0.3s; }
        .face-back { transform: rotateY(180deg); background: linear-gradient(135deg, #818cf8, #6366f1); color: white; }
        .face:hover { box-shadow: 0 20px 50px -15px rgba(79, 70, 229, 0.15); }
        input, textarea { transition: all 0.2s; border: 1px solid #eaeaea !important; }
        input:focus, textarea:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.08) !important; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #eaeaea; border-radius: 3px; }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <div class="w-full max-w-md flex flex-col h-[95dvh]">
        <div class="flex justify-between items-center mb-8 px-2">
            <div class="flex flex-col">
                <h1 class="text-3xl font-black italic text-indigo-700 leading-none tracking-tighter">KP v∞</h1>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mt-2 italic">Infinity Potential AI</span>
            </div>
            <p id="count" class="text-xs font-black bg-white px-4 py-2 rounded-full shadow-inner text-slate-500 border border-slate-100"></p>
        </div>

        <main id="app" class="flex-grow overflow-hidden relative bg-white rounded-[48px] shadow-3xl shadow-indigo-100 border border-white p-7"></main>

        <nav class="mt-8 flex gap-3 bg-white/70 backdrop-blur-lg p-3 rounded-[32px] shadow-xl border border-white">
            <button onclick="router('study')" id="m-study" class="flex-1 py-4 rounded-2xl font-bold transition-all duration-300 hover:bg-indigo-50 text-slate-600">HỌC</button>
            <button onclick="router('add')" id="m-add" class="flex-1 py-4 rounded-2xl font-bold transition-all duration-300 hover:bg-indigo-50 text-slate-600 text-sm">THÊM TỪ</button>
            <button onclick="router('list')" id="m-list" class="flex-1 py-4 rounded-2xl font-bold transition-all duration-300 hover:bg-indigo-50 text-slate-600">KHO</button>
        </nav>
    </div>

    <script>
        const db = {
            // Chuyển dữ liệu từ bản V23 cũ sang hệ thống quản lý Vô Hạn mới
            data: JSON.parse(localStorage.getItem('KP_V23_DATA')) || [],
            // Lưu dữ liệu vào két sắt Vô Hạn
            save() {
                localStorage.setItem('KP_INFINITY_DATA', JSON.stringify(this.data));
                localStorage.setItem('KP_V23_DATA', JSON.stringify(this.data)); // Giữ bản V23 để dự phòng
                document.getElementById('count').innerText = this.data.length + " UNITS";
            }
        };

        // THUẬT TOÁN TRÍ NHỚ SIÊU VIỆT V-INFINITY (Logic lõi)
        class SpacedRepetition {
            constructor() { this.intervals = [1, 2, 5, 10, 25, 60, 150]; } // Các mốc thời gian Review vàng (ngày)
            getNextReview(item, isCorrect) {
                let intervalIdx = item.intervalIdx || 0;
                if (isCorrect) {
                    intervalIdx = Math.min(intervalIdx + 1, this.intervals.length - 1);
                } else {
                    intervalIdx = 0; // Quên là học lại từ đầu
                }
                const nextReview = new Date();
                nextReview.setDate(nextReview.getDate() + this.intervals[intervalIdx]);
                return { intervalIdx, nextReviewTime: nextReview.getTime() };
            }
        }
        const aiMemory = new SpacedRepetition();

        let state = { view: '', idx: 0, flipped: false, queue: [] };

        // 1. AI DỊCH THUẬT TINH TẾ (Nâng cấp)
        async function translate(word) {
            if(!word) return "";
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&dt=at&q=meaning of ${encodeURIComponent(word)}`;
                const res = await fetch(url);
                const data = await res.json();
                let result = data[0][0][0].toLowerCase();
                result = result.replace(/nghĩa là /g, "").replace(/ý nghĩa của /g, "").replace(/của /g, "");
                
                // Bộ lọc vá "ngáo" Google xịn nhất hiện nay
                const intelligentDictionary = {
                    "break a leg": "chúc may mắn",
                    "hand down": "truyền lại / tuyên án",
                    "hands down": "dễ dàng / chắc chắn",
                    "piece of cake": "dễ như ăn bánh",
                    "cut someone some slack": "tha thứ cho ai đó",
                    "get over something": "vượt qua (nỗi đau)",
                    "hang in there": "cố gắng lên"
                };
                return intelligentDictionary[word.toLowerCase().trim()] || result;
            } catch { return ""; }
        }

        async function getPhonetic(word) {
            try {
                const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
                const data = await res.json();
                return data[0]?.phonetic || data[0]?.phonetics?.find(p => p.text)?.text || "";
            } catch { return ""; }
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.82; // Tốc độ Vô Hạn: tối ưu để nghe từng nhấn âm
            window.speechSynthesis.speak(utterance);
        }

        function router(view) {
            state.view = view;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            const activeBtn = document.getElementById('m-' + view);
            if(activeBtn) activeBtn.classList.add('tab-active');
            const container = document.getElementById('app');
            container.innerHTML = '';
            if (view === 'add') renderAdd(container);
            if (view === 'list') renderList(container);
            if (view === 'study') renderStudy(container);
            db.save();
        }

        function renderAdd(v) {
            v.innerHTML = `
                <div class="h-full flex flex-col space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="bg-indigo-50/70 p-6 rounded-[36px] border border-indigo-100/70 relative">
                        <p class="text-[9px] font-black text-indigo-400 mb-4 uppercase tracking-[0.25em]">Nhập lẻ AI Vô Hạn</p>
                        <input id="in-en" placeholder="Gõ tiếng Anh..." class="w-full p-4 rounded-2xl bg-white border-none outline-none font-bold text-lg mb-4 shadow-sm placeholder:text-slate-300">
                        <div id="in-ph" class="hidden"></div> 
                        <input id="in-vi" placeholder="Nghĩa tinh tế..." class="w-full p-4 rounded-2xl bg-white/90 border-none outline-none text-indigo-600 font-semibold shadow-sm placeholder:text-indigo-200">
                        <button onclick="addSingle()" class="w-full mt-4 py-4.5 bg-indigo-600 text-white rounded-2xl font-black text-sm shadow-lg shadow-indigo-100 active:scale-95 transition-all uppercase tracking-[0.2em]">LƯU BẢO BỐI</button>
                    </div>
                    
                    <div class="flex-grow flex flex-col">
                        <p class="text-[9px] font-black text-slate-400 mb-4 uppercase tracking-[0.25em]">Nhập lô (từ : nghĩa)</p>
                        <textarea id="bulk-input" class="flex-grow w-full p-6 bg-slate-50/50 border-none rounded-[36px] outline-none text-sm font-medium text-slate-600 shadow-inner placeholder:text-slate-300" placeholder="apple : quả táo&#10;break a leg : chúc may mắn"></textarea>
                        <button onclick="handleImport()" class="w-full mt-4 py-4 bg-slate-800 text-white rounded-2xl font-black text-sm uppercase active:scale-95 transition-all tracking-[0.2em] shadow-2xl">Import Tất cả</button>
                    </div>
                </div>
            `;
            
            const enInput = document.getElementById('in-en');
            let timer;
            enInput.oninput = () => {
                clearTimeout(timer);
                timer = setTimeout(async () => {
                    const val = enInput.value.trim();
                    if(val) {
                        document.getElementById('in-vi').value = await translate(val);
                        document.getElementById('in-ph').innerText = await getPhonetic(val);
                    }
                }, 500);
            };
        }

        function addSingle() {
            const en = document.getElementById('in-en').value.trim();
            const vi = document.getElementById('in-vi').value.trim();
            const ph = document.getElementById('in-ph').innerText;
            if(en && vi) {
                // Khởi tạo các tham số trí nhớ cho từ mới
                db.data.push({ id: Date.now(), en, vi, ph, intervalIdx: 0, nextReviewTime: Date.now() });
                db.save();
                router('add');
            }
        }

        function handleImport() {
            const input = document.getElementById('bulk-input').value;
            input.split('\n').forEach(line => {
                const parts = line.split(':');
                if (parts.length >= 2) {
                    const en = parts[0].trim(), vi = parts[1].trim();
                    if (en && vi) {
                        // Khởi tạo tham số trí nhớ mặc định cho từ nhập lô
                        db.data.push({ id: Date.now() + Math.random(), en, vi, ph: "", intervalIdx: 0, nextReviewTime: Date.now() });
                    }
                }
            });
            db.save();
            router('list');
        }

        // 3. AI HỌC TẬP THÔNG MINH (Nâng cấp)
        function renderStudy(v) {
            if (db.data.length === 0) return v.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-300 font-black italic animate-pulse">KHO AI VÔ HẠN ĐANG TRỐNG...</div>`;
            
            const currentTime = Date.now();
            // Chỉ hiện các từ đến hạn review. Nếu không có, đảo thứ tự ngẫu nhiên.
            state.queue = db.data.filter(item => !item.nextReviewTime || item.nextReviewTime <= currentTime);
            if(state.queue.length === 0) {
                 state.queue = [...db.data].sort(() => Math.random() - 0.5);
            }
            if (state.idx >= state.queue.length) state.idx = 0;
            
            const item = state.queue[state.idx];
            state.flipped = false;
            
            speak(item.en);

            v.innerHTML = `
                <div class="h-full flex flex-col animate-in zoom-in-95 duration-400">
                    <div class="card" onclick="flip()">
                        <div id="card-inner" class="card-inner">
                            <div class="face shadow-sm">
                                <div class="text-xs uppercase tracking-[0.4em] opacity-40 mb-6 font-bold text-indigo-400">English</div>
                                <div class="text-5xl font-extrabold leading-tight">${item.en}</div>
                                <div class="text-lg text-indigo-400 font-semibold mt-3 tracking-widest">${item.ph || ''}</div>
                                
                                <button onclick="event.stopPropagation(); speak('${item.en.replace(/'/g, "\\'")}')" class="mt-10 p-5 bg-indigo-50/70 rounded-full text-indigo-500 hover:bg-indigo-100 hover:scale-110 transition-all shadow-inner border border-indigo-100/70">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                                </button>
                            </div>
                            <div class="face face-back shadow-indigo-200 shadow-3xl">
                                <span class="text-xs uppercase tracking-[0.3em] opacity-60 mb-5 font-bold">Nghĩa là</span>
                                <div class="text-4xl font-extrabold">${item.vi}</div>
                                <div class="mt-auto flex gap-4 w-full">
                                    <button onclick="event.stopPropagation(); processReview(false)" class="flex-1 py-4 bg-rose-50/80 text-rose-600 rounded-2xl font-black text-sm active:scale-95 transition-all">QUÊN MẤT</button>
                                    <button onclick="event.stopPropagation(); processReview(true)" class="flex-1 py-4 bg-white text-indigo-700 rounded-2xl font-black text-sm active:scale-95 transition-all shadow-xl">ĐÃ THUỘC</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Logic xử lý trí nhớ dựa trên câu trả lời của cậu
        function processReview(isCorrect) {
            const currentTime = Date.now();
            // Lấy đúng Item đang học trong Queue
            const queueItem = state.queue[state.idx];
            // Tìm Item đó trong dữ liệu gốc (Két sắt)
            const dbItem = db.data.find(i => i.id === queueItem.id);
            if(dbItem) {
                const { intervalIdx, nextReviewTime } = aiMemory.getNextReview(dbItem, isCorrect);
                dbItem.intervalIdx = intervalIdx;
                dbItem.nextReviewTime = nextReviewTime;
                db.save();
                state.idx++;
                renderStudy(document.getElementById('app'));
            }
        }

        function flip() {
            state.flipped = !state.flipped;
            const el = document.getElementById('card-inner');
            if(el) el.classList.toggle('is-flipped', state.flipped);
        }

        function renderList(v) {
            const items = db.data.slice().reverse().map(item => `
                <div class="flex justify-between items-center p-6 border-b border-slate-50 hover:bg-slate-50 transition-colors rounded-3xl mb-1.5">
                    <div class="text-sm">
                        <b class="text-indigo-600 font-bold">${item.en}</b> 
                        ${item.ph ? `<span class="text-[10px] text-indigo-300 ml-1.5 font-semibold">${item.ph}</span>` : ''}
                        <span class="text-slate-300 mx-2.5">•</span> 
                        <span class="text-slate-500">${item.vi}</span>
                    </div>
                    <button onclick="deleteItem(${item.id})" class="w-9 h-9 flex items-center justify-center bg-rose-50 text-rose-400 rounded-full hover:bg-rose-500 hover:text-white transition-all text-[10px] font-black shadow-inner">X</button>
                </div>
            `).join('');
            v.innerHTML = `<div class="h-full overflow-y-auto custom-scroll">${items || '<p class="text-center mt-12 opacity-25 font-bold animate-pulse">Trống</p>'}</div>`;
        }

        function deleteItem(id) {
            if(confirm("Xóa bảo bối này khỏi kho Vô Hạn?")) {
                db.data = db.data.filter(i => i.id !== id);
                db.save();
                router('list');
            }
        }

        window.onkeydown = (e) => {
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') {
                if(e.key === 'Enter' && e.target.id === 'in-en') addSingle();
                return;
            }
            if (state.view === 'study' && state.flipped) {
                if (e.key === 'q' || e.key === 'Q') { processReview(false); e.preventDefault(); }
                if (e.key === '1' || e.key === 'Enter') { processReview(true); e.preventDefault(); }
            }
            if (e.code === 'Space' || e.key === 'Enter') {
                if (state.view === 'study' && !state.flipped) { e.preventDefault(); flip(); }
            }
        };

        router('study');
    </script>
</body>
</html>
