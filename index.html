<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KP STRIKER | BINARY FOCUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, sans-serif; background: #000; color: #d4d4d8; overflow: hidden; }
        .tab-active { background: #14b8a6 !important; color: #000 !important; font-weight: 900 !important; }
        header, nav { opacity: 0.3; transition: opacity 0.3s ease; }
        header:hover, nav:hover, header:focus-within, nav:focus-within { opacity: 1; }
        .card-side { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 360px; border-radius: 32px; width: 100%; border: 1px solid #14b8a611; transition: all 0.1s ease-out; }
        .leech-card { border: 1px solid #ef444433 !important; }
        .progress-bar { position: fixed; bottom: 0; left: 0; height: 3px; background: linear-gradient(90deg, #14b8a6, #3b82f6); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
        .custom-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex justify-center p-2 sm:p-4">
    <div id="progress" class="progress-bar" style="width: 0%"></div>
    
    <div class="w-full max-w-lg flex flex-col h-[98dvh]">
        <header class="bg-zinc-900/80 backdrop-blur-md border border-zinc-800 p-5 rounded-3xl flex justify-between items-center mb-3">
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <span class="font-black text-amber-500 text-lg">🔥 <span id="streak">0</span></span>
                    <span id="backup-status" class="text-[8px] font-black px-2 py-0.5 rounded-full uppercase bg-teal-500/10 text-teal-600">Active</span>
                </div>
            </div>
            <div class="text-right">
                <div class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Target Today</div>
                <div id="target-count" class="text-2xl font-black text-teal-500 leading-none">0</div>
            </div>
        </header>

        <main id="view" class="flex-grow relative"></main>

        <nav class="mt-3 grid grid-cols-4 gap-2">
            <button onclick="Core.route('study')" id="n-study" class="bg-zinc-900 border border-zinc-800 py-4 rounded-2xl font-bold text-zinc-500 text-xs uppercase hover:bg-zinc-800 transition">Study</button>
            <button onclick="Core.route('nexus')" id="n-nexus" class="bg-zinc-900 border border-zinc-800 py-4 rounded-2xl font-bold text-zinc-500 text-xs uppercase hover:bg-zinc-800 transition">Nexus</button>
            <button onclick="Core.route('vault')" id="n-vault" class="bg-zinc-900 border border-zinc-800 py-4 rounded-2xl font-bold text-zinc-500 text-xs uppercase hover:bg-zinc-800 transition">Vault</button>
            <button onclick="Core.route('data')" id="n-data" class="bg-zinc-900 border border-zinc-800 py-4 rounded-2xl font-bold text-zinc-500 text-[10px] uppercase hover:bg-zinc-800 transition">Data</button>
        </nav>
    </div>

    <script>
        // 1. LÕI FSRS v5 - 19 WEIGHTS CHUẨN QUỐC TẾ
        const W = [0.4022, 0.9485, 2.5157, 14.2658, 4.9157, 1.0567, 0.9313, 0.0151, 1.636, 0.137, 1.0114, 2.21, 0.0805, 0.3125, 2.1226, 0.2464, 2.107, 0.5046, 0.9347];
        
        const Sfx = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(f, t, d) {
                if(!this.ctx) return;
                const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, this.ctx.currentTime);
                g.gain.setValueAtTime(0.1, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
                o.connect(g); g.connect(this.ctx.destination);
                o.start(); o.stop(this.ctx.currentTime + d);
            },
            fail() { this.init(); this.play(150, 'sawtooth', 0.2); },
            pass() { this.init(); this.play(880, 'sine', 0.1); }
        };

        const DB = {
            vocab: [],
            meta: { streak: 0, lastDate: null, retention: 0.9, speechRate: 0.9 },
            cache: new Map(),
            async init() {
                const req = indexedDB.open("KP_STRIKER", 1);
                req.onupgradeneeded = (e) => e.target.result.createObjectStore("store");
                return new Promise(res => {
                    req.onsuccess = async (e) => {
                        this.idb = e.target.result;
                        const s = this.idb.transaction("store").objectStore("store");
                        this.vocab = await new Promise(r => s.get("v").onsuccess = e => r(e.target.result || []));
                        const m = await new Promise(r => s.get("m").onsuccess = e => r(e.target.result));
                        if(m) Object.assign(this.meta, m); res();
                    }
                });
            },
            async save() {
                const tx = this.idb.transaction("store", "readwrite");
                tx.objectStore("store").put(this.vocab, "v");
                tx.objectStore("store").put(this.meta, "m");
                this.updateUI();
            },
            updateUI() {
                document.getElementById('streak').innerText = this.meta.streak;
                const due = this.vocab.filter(i => !i.trash && i.next <= Date.now()).length;
                document.getElementById('target-count').innerText = due;
            }
        };

        const Core = {
            state: { view: '', queue: [], initialQueueSize: 0, flipped: false, trash: false },
            route(v) {
                this.state.view = v; this.state.flipped = false;
                document.querySelectorAll('nav button').forEach(b => b.classList.toggle('tab-active', b.id === 'n-'+v));
                const port = document.getElementById('view'); port.innerHTML = '';
                if(v === 'study') this.renderStudy(port);
                else if(v === 'nexus') this.renderNexus(port);
                else if(v === 'vault') this.renderVault(port);
                else if(v === 'data') this.renderData(port);
            },
            renderStudy(v) {
                if(!this.state.queue.length) {
                    this.state.queue = DB.vocab.filter(i => !i.trash && i.next <= Date.now()).sort((a,b) => a.next - b.next);
                    this.state.initialQueueSize = this.state.queue.length;
                }
                const progress = document.getElementById('progress');
                if (this.state.initialQueueSize > 0) {
                    const doneCount = this.state.initialQueueSize - this.state.queue.length;
                    progress.style.width = `${(doneCount / this.state.initialQueueSize) * 100}%`;
                } else { progress.style.width = '100%'; }

                if(!this.state.queue.length) {
                    v.innerHTML = `<div class="card-side border-dashed border-zinc-800 text-[10px] font-black uppercase text-zinc-600 italic">Target Cleared.</div>`;
                    this.state.initialQueueSize = 0; return;
                }
                
                const item = this.state.queue[0];
                v.innerHTML = `
                    <div class="h-full flex flex-col">
                        <div class="relative cursor-pointer flex-grow flex flex-col" onclick="Core.flip()">
                            <div id="cf" class="card-side bg-zinc-900 p-8 text-center flex-grow ${item.failCount >= 5 ? 'leech-card' : ''}">
                                <h2 class="text-5xl font-black tracking-tighter uppercase text-zinc-100">${item.en}</h2>
                                ${item.failCount >= 5 ? '<p class="text-[8px] text-red-500 font-bold mt-4 tracking-[0.2em]">STUBBORN WORD</p>' : ''}
                            </div>
                            <div id="cb" class="card-side p-8 text-center flex-grow hidden bg-zinc-900 border-teal-500/10">
                                <h2 class="text-4xl font-black text-teal-400">${item.vi}</h2>
                            </div>
                        </div>
                        <div id="ctrl" class="grid grid-cols-2 gap-3 mt-3 opacity-10 pointer-events-none">
                            <button onclick="Core.ans(false)" class="bg-zinc-900 border border-red-900/30 py-8 rounded-3xl text-xs font-black text-red-500 uppercase active:scale-95 transition-transform">FAIL [1]</button>
                            <button onclick="Core.ans(true)" class="bg-zinc-900 border border-teal-900/30 py-8 rounded-3xl text-xs font-black text-teal-500 uppercase active:scale-95 transition-transform">PASS [2]</button>
                        </div>
                    </div>`;
            },
            flip() {
                if(this.state.view !== 'study' || !this.state.queue.length || this.state.flipped) return;
                Sfx.init(); this.state.flipped = true;
                document.getElementById('cf').classList.add('hidden');
                document.getElementById('cb').classList.remove('hidden');
                document.getElementById('ctrl').classList.remove('opacity-10', 'pointer-events-none');
                const item = this.state.queue[0];
                window.speechSynthesis.cancel();
                const m = new SpeechSynthesisUtterance(item.en); m.rate = DB.meta.speechRate;
                window.speechSynthesis.speak(m);
            },
            ans(isPass) {
                if(!this.state.flipped) return;
                const item = this.state.queue.shift();
                if(!isPass) {
                    Sfx.fail();
                    item.failCount = (item.failCount || 0) + 1;
                    this.processFSRS(item, 1);
                    this.state.queue.push(item);
                } else {
                    Sfx.pass();
                    item.failCount = 0;
                    this.processFSRS(item, 3);
                    const ds = new Date().toDateString();
                    if(DB.meta.lastDate !== ds) {
                        const l = new Date(DB.meta.lastDate);
                        DB.meta.streak = (new Date()-l < 151200000) ? DB.meta.streak+1 : 1;
                        DB.meta.lastDate = ds;
                    }
                }
                DB.save(); this.route('study');
            },
            // 2. LOGIC ÉP XUNG FSRS v5 - TINH CHỈNH THEO DỮ LIỆU THỜI GIAN THỰC
            processFSRS(item, g) {
                let { s, d, reps, laps, lastReview } = item;
                const now = Date.now();
                const t = lastReview ? Math.max(0, (now - lastReview) / 86400000) : 0;

                if (!reps || reps === 0) {
                    s = W[g-1];
                    d = W[4] - (g-3)*W[5];
                    reps = 0; laps = 0;
                } else {
                    const r = Math.exp(Math.log(0.9) * (t / s));
                    d = Math.min(10, Math.max(1, d - W[6]*(g-3)));
                    d = W[4] - W[5]*(g-3) + (d - W[4])*W[7];
                    
                    if(g === 1) {
                        s = W[11] * Math.pow(d, -W[12]) * (Math.pow(s + 1, W[13]) - 1) * Math.exp(W[14] * (1 - r));
                        laps++;
                    } else {
                        s = s * (1 + Math.exp(W[8]) * (11 - d) * Math.pow(s, -W[9]) * (Math.exp(W[10] * (1 - r)) - 1));
                    }
                }
                reps++;
                item.lastReview = now;
                let ivl = s / Math.log(0.9) * Math.log(DB.meta.retention || 0.9);
                ivl = Math.max(1, Math.round(ivl));
                
                // FUZZING TRÁNH CLUMPING
                if (ivl > 2) {
                    const f = ivl * 0.05;
                    ivl = Math.round(ivl + (Math.random() * f * 2 - f));
                }
                if(g === 1) ivl = 0; // Để học lại ngay trong phiên hoặc ngày mai tùy queue

                Object.assign(item, { s, d, reps, laps, interval: ivl, next: now + (g === 1 ? 0 : ivl * 86400000) });
            },
            renderNexus(p) {
                p.innerHTML = `
                <div class="h-full flex flex-col gap-3">
                    <div class="bg-zinc-900 p-6 rounded-[2rem] flex flex-col gap-3 border border-zinc-800 relative z-10">
                        <input id="in-en" autocomplete="off" placeholder="ENGLISH" class="w-full p-4 bg-zinc-800 text-white rounded-2xl outline-none focus:ring-2 ring-teal-500 font-black text-2xl uppercase transition-shadow">
                        <input id="in-vi" autocomplete="off" placeholder="NGHĨA" class="w-full p-4 bg-zinc-800 text-teal-500 rounded-2xl outline-none font-bold">
                        <button onclick="Core.add()" class="bg-teal-500 hover:bg-teal-400 text-black py-4 rounded-2xl font-black uppercase text-[10px] transition-colors">Add to Brain [Enter]</button>
                    </div>
                    <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-[2rem] flex-grow flex flex-col group">
                        <div class="text-[9px] font-black uppercase text-zinc-600 mb-2 px-2 flex justify-between"><span>Bulk Import</span><span>word:meaning</span></div>
                        <textarea id="in-batch" placeholder="apple:quả táo&#10;banana:quả chuối" class="flex-grow w-full bg-transparent text-teal-100/70 outline-none font-bold text-sm custom-scroll p-2 resize-none"></textarea>
                        <button onclick="Core.batch()" class="mt-2 bg-zinc-800 text-zinc-400 py-3 rounded-xl font-black text-[9px] uppercase hover:bg-zinc-700 hover:text-white transition-colors">Import Batch</button>
                    </div>
                </div>`;
                const en = document.getElementById('in-en'); en.focus();
                en.oninput = () => {
                    const v = en.value.trim().toLowerCase(); if(v.length < 2) return;
                    if(DB.cache.has(v)) { document.getElementById('in-vi').value = DB.cache.get(v).vi; return; }
                    clearTimeout(this.tm);
                    this.tm = setTimeout(async () => {
                        try {
                            const t = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${v}`).then(r => r.json());
                            const res = { vi: t?.[0]?.[0]?.[0]||'' };
                            DB.cache.set(v, res); document.getElementById('in-vi').value = res.vi;
                        } catch(e){}
                    }, 500);
                };
            },
            add() {
                const en = document.getElementById('in-en').value.trim(), vi = document.getElementById('in-vi').value.trim();
                if(!en || !vi) return;
                DB.vocab.push({ id: Date.now(), en, vi, next: Date.now(), trash: false, failCount: 0, reps: 0, s: 0, d: 0, laps: 0, lastReview: 0 });
                DB.save(); document.getElementById('in-en').value = ''; document.getElementById('in-vi').value = ''; document.getElementById('in-en').focus();
            },
            batch() {
                const lines = document.getElementById('in-batch').value.split('\n');
                let count = 0;
                lines.forEach(l => {
                    const match = l.match(/^(.*?)(?::|-|=)(.*)$/);
                    if(match) {
                        const en = match[1].trim(), vi = match[2].trim();
                        if(en && vi) {
                            DB.vocab.push({ id: Date.now() + Math.random(), en, vi, next: Date.now(), trash: false, failCount: 0, reps: 0, s: 0, d: 0, laps: 0, lastReview: 0 });
                            count++;
                        }
                    }
                });
                if(count > 0) { DB.save(); document.getElementById('in-batch').value = ''; alert(`⚡ Imported ${count} words!`); this.route('nexus'); }
            },
            renderVault(v) {
                v.innerHTML = `<input id="v-search" oninput="Core.search(this.value)" placeholder="SEARCH..." class="w-full p-4 bg-zinc-900 border border-zinc-800 text-white rounded-2xl outline-none font-bold text-sm mb-3 focus:ring-1 ring-zinc-700"><div id="v-list" class="overflow-y-auto max-h-[60vh] flex flex-col gap-2 custom-scroll"></div>`;
                this.search('');
            },
            search(q) {
                const list = document.getElementById('v-list'); list.innerHTML = '';
                const items = DB.vocab.filter(i => !i.trash && (i.en.toLowerCase().includes(q.toLowerCase()) || i.vi.toLowerCase().includes(q.toLowerCase())));
                items.slice(-50).reverse().forEach(item => {
                    const d = document.createElement('div'); d.className = "flex justify-between items-center p-4 bg-zinc-900 border border-zinc-800 rounded-2xl";
                    d.innerHTML = `<div class="text-xs font-black uppercase">${item.en} <span class="text-teal-600">/ ${item.vi}</span></div><button onclick="Core.del(${item.id})" class="text-[8px] font-black text-red-900/50 hover:text-red-500 uppercase px-3 py-2">DEL</button>`;
                    list.appendChild(d);
                });
            },
            del(id) { DB.vocab.find(x => x.id === id).trash = true; DB.save(); this.search(document.getElementById('v-search').value); },
            renderData(v) {
                v.innerHTML = `<div class="bg-zinc-900 p-8 rounded-[2rem] border border-zinc-800 flex flex-col gap-4">
                    <button onclick="Core.exp()" class="py-4 bg-zinc-800 rounded-2xl font-black text-[10px] hover:bg-zinc-700 uppercase transition-colors">Export Archive</button>
                    <button onclick="document.getElementById('file').click()" class="py-4 bg-zinc-800 rounded-2xl font-black text-[10px] uppercase text-zinc-500 hover:bg-zinc-700 hover:text-zinc-300 transition-colors">Import Archive</button>
                    <input type="file" id="file" class="hidden" onchange="Core.imp(this)">
                </div>`;
            },
            exp() { const b = new Blob([JSON.stringify({v:DB.vocab, m:DB.meta})], {type:'application/json'}); const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='KP_STRIKER_DATA.json'; a.click(); },
            imp(el) { const r = new FileReader(); r.onload = e => { const d = JSON.parse(e.target.result); DB.vocab=d.v; DB.meta=d.m; DB.save(); location.reload(); }; r.readAsText(el.files[0]); }
        };

        window.onkeydown = (e) => {
            const k = e.key.toLowerCase(); const foc = document.activeElement.id; const tag = document.activeElement.tagName;
            if(foc === 'in-en' || foc === 'in-vi') { if(e.key === 'Enter') { e.preventDefault(); Core.add(); } return; }
            if(tag === 'TEXTAREA' || foc === 'v-search') return;
            if(['a','s','d','f'].includes(k) && tag !== 'INPUT' && tag !== 'TEXTAREA') { e.preventDefault(); Core.route(k==='a'?'study':k==='s'?'nexus':k==='d'?'vault':'data'); }
            if(Core.state.view === 'study' && Core.state.queue.length) {
                if(e.code === 'Space') { e.preventDefault(); Core.flip(); }
                if(Core.state.flipped) { if(k === '1') Core.ans(false); if(k === '2') Core.ans(true); }
            }
        };

        DB.init().then(() => { Core.route('study'); DB.updateUI(); });
    </script>
</body>
</html>
