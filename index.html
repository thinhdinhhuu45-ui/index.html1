<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Học Siêu Tập Trung 🌧️🔥</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --text-color: #e94560;
            --card-bg: #16213e;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 2px solid var(--text-color);
            max-width: 400px;
            width: 90%;
        }

        h1 { color: var(--text-color); margin-bottom: 10px; }
        p { font-size: 0.9rem; opacity: 0.8; margin-bottom: 20px; }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin-bottom: 20px;
        }

        .btn {
            border: 2px solid var(--text-color);
            color: var(--text-color);
            background-color: transparent;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background-color: var(--text-color);
            color: white;
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        audio {
            width: 100%;
            margin-top: 20px;
            filter: sepia(20%) saturate(70%) grayscale(100%) contrast(99%) invert(12%);
        }

        .status {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #4ecca3;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Study Vibes 🌧️</h1>
        <p>Tối ưu hóa bởi Pháp Sư Tin Học (─‿─)</p>

        <div class="upload-btn-wrapper">
            <button class="btn">🎵 Chọn file nhạc của ông</button>
            <input type="file" id="music-upload" accept="audio/*" onchange="loadLocalMusic(this)" />
        </div>

        <div id="player-zone" class="hidden">
            <audio id="rain-audio" controls loop></audio>
            <div id="status-msg" class="status"></div>
        </div>
    </div>

    <script>
        function loadLocalMusic(input) {
            const file = input.files[0];
            const statusMsg = document.getElementById('status-msg');
            const playerZone = document.getElementById('player-zone');
            
            if (file) {
                const url = URL.createObjectURL(file);
                const rain = document.getElementById('rain-audio');
                rain.src = url;

                let startPoint = 0;
                let endPoint = 0;

                rain.onloadedmetadata = () => {
                    const totalDuration = rain.duration;
                    console.log("Tổng thời lượng file: " + totalDuration + "s");

                    // LOGIC TỐI ƯU CỦA ÔNG CHỦ ĐÂY:
                    if (totalDuration > 21600) { 
                        // Trường hợp file siêu dài (trên 6 tiếng)
                        startPoint = 0;      // Chạy từ đầu
                        endPoint = 21600;    // Lặp lại khi tới tiếng thứ 6
                        statusMsg.innerText = "✨ Chế độ: 6 TIẾNG ĐẦU TIÊN (Đã tối ưu)";
                    } else {
                        // Trường hợp file ngắn (bản lách tách)
                        startPoint = 1705;   // 28:25
                        endPoint = 1992;     // 33:12
                        statusMsg.innerText = "✨ Chế độ: LÁCH TÁCH (28:25 -> 33:12)";
                    }
                    
                    playerZone.classList.remove('hidden');
                };

                // Đảm bảo khi bấm Play nó nhảy đúng chỗ (nếu cần)
                rain.onplay = () => {
                    if (rain.currentTime < startPoint || rain.currentTime >= endPoint) {
                        rain.currentTime = startPoint;
                    }
                };

                // Vòng lặp siêu nhẹ, siêu mượt
                rain.ontimeupdate = () => {
                    if (rain.currentTime >= endPoint) {
                        rain.currentTime = startPoint;
                        console.log("Đã lặp lại để tiết kiệm tài nguyên! (─‿─)");
                    }
                };

                // Tự động phát luôn cho máu
                rain.play().catch(e => console.log("Cần tương tác người dùng để phát nhạc!"));
            }
        }
    </script>
</body>
</html>
